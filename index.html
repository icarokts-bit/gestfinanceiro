                </div>
                <div>
                  <h1 className="text-xl font-extrabold tracking-tight">FinançasPro</h1>
                  <p className="text-xs text-slate-400">Gestor Inteligente de Caixa & Crédito</p>
                </div>
              </div>

              {/* Status de Conectividade */}
              <div className="flex items-center gap-2 text-xs font-semibold px-3 py-1.5 rounded-full bg-slate-800 border border-slate-700">
                {dbStatus === 'connecting' && (
                  <>
                    <Icon name="loader" className="w-3.5 h-3.5 text-amber-400 animate-spin" />
                    <span className="text-amber-400">A estabelecer sincronização...</span>
                  </>
                )}
                {dbStatus === 'synced' && (
                  <>
                    <Icon name="cloud" className="w-3.5 h-3.5 text-emerald-400" />
                    <span className="text-emerald-400">Firebase Conectado</span>
                  </>
                )}
                {dbStatus === 'error' && (
                  <>
                    <Icon name="cloudLightning" className="w-3.5 h-3.5 text-amber-500 animate-pulse" />
                    <span className="text-amber-500">Apenas Local (Segurança Firestore Ativa)</span>
                  </>
                )}
              </div>
            </div>
          </header>

          <div className="max-w-7xl mx-auto px-4 py-6 flex-1 w-full flex flex-col">
            
            {/* Banner Informativo sobre as Regras do Firestore */}
            {dbStatus === 'error' && (
              <div className="bg-amber-50 border-l-4 border-amber-500 p-5 rounded-2xl mb-6 shadow-sm">
                <div className="flex flex-col md:flex-row gap-4 items-start justify-between">
                  <div className="flex gap-3">
                    <Icon name="alertTriangle" className="w-5 h-5 text-amber-600 shrink-0 mt-0.5" />
                    <div className="text-xs text-slate-700 space-y-1.5">
                      <p className="font-bold text-sm text-slate-900">Configuração das Regras do Firestore Pendente</p>
                      <p>O seu banco de dados do Firebase Cloud Firestore está a recusar acessos externos porque as regras de segurança padrão estão ativas.</p>
                      <p className="font-semibold text-amber-900">Siga estes passos rápidos para resolver:</p>
                      <ol className="list-decimal list-inside space-y-1 text-slate-600 bg-white/70 p-3 rounded-xl border border-amber-200">
                        <li>Inicie sessão no Console do Firebase &gt; Cloud Firestore &gt; guia de <strong>Regras (Rules)</strong>.</li>
                        <li>Clique no botão à direita para copiar o modelo de regras otimizado.</li>
                        <li>Substitua o conteúdo no console do Firebase e clique em <strong>Publicar (Publish)</strong>.</li>
                      </ol>
                    </div>
                  </div>

                  <button 
                    onClick={handleCopyRules}
                    className="w-full md:w-auto shrink-0 flex items-center justify-center gap-2 px-4 py-2.5 bg-slate-900 hover:bg-slate-800 text-white font-bold text-xs rounded-xl shadow transition"
                  >
                    <Icon name={copied ? 'check' : 'copy'} className="w-4 h-4" />
                    <span>{copied ? 'Copiado!' : 'Copiar Regras Prontas'}</span>
                  </button>
                </div>
              </div>
            )}

            <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 w-full flex-1">
              
              {/* Navegação Lateral */}
              <aside className="lg:col-span-3 flex flex-col gap-3">
                
                {/* Widget Seletor do Mês de Referência */}
                <div className="bg-white rounded-2xl p-4 shadow-sm border border-slate-200">
                  <p className="text-[10px] font-bold uppercase tracking-wider text-slate-400 px-1 mb-2">
                    📅 Período de Análise (Vencimento)
                  </p>
                  
                  <div className="flex items-center gap-1.5">
                    <button
                      onClick={() => navigateMonth('prev')}
                      disabled={selectedMonth === 'all'}
                      className={`p-2 rounded-xl border transition shrink-0 ${
                        selectedMonth === 'all' 
                          ? 'border-slate-100 text-slate-300 cursor-not-allowed' 
                          : 'border-slate-200 hover:bg-slate-50 text-slate-600'
                      }`}
                      title="Mês Anterior"
                    >
                      <Icon name="chevronLeft" className="w-4 h-4" />
                    </button>

                    <select
                      value={selectedMonth}
                      onChange={e => setSelectedMonth(e.target.value)}
                      className="flex-1 text-xs font-extrabold rounded-xl border border-slate-200 px-2 py-2.5 bg-slate-50 text-slate-800 focus:outline-none focus:ring-1 focus:ring-emerald-500 cursor-pointer"
                    >
                      <option value="all">🌐 Todos os Períodos</option>
                      {availableMonths.map(m => (
                        <option key={m.value} value={m.value}>
                          {m.label}
                        </option>
                      ))}
                    </select>

                    <button
                      onClick={() => navigateMonth('next')}
                      disabled={selectedMonth === 'all'}
                      className={`p-2 rounded-xl border transition shrink-0 ${
                        selectedMonth === 'all' 
                          ? 'border-slate-100 text-slate-300 cursor-not-allowed' 
                          : 'border-slate-200 hover:bg-slate-50 text-slate-600'
                      }`}
                      title="Mês Seguinte"
                    >
                      <Icon name="chevronRight" className="w-4 h-4" />
                    </button>
                  </div>
                </div>

                {/* Menu de Navegação */}
                <div className="bg-white rounded-2xl p-4 shadow-sm border border-slate-200">
                  <p className="text-xs font-semibold uppercase tracking-wider text-slate-400 px-3 mb-2">Menu de Navegação</p>
                  <nav className="flex flex-col gap-1">
                    <button 
                      onClick={() => setActiveTab('dashboard')}
                      className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left text-sm font-semibold transition ${
                        activeTab === 'dashboard' ? 'bg-emerald-50 text-emerald-800 font-bold' : 'hover:bg-slate-50 text-slate-600'
                      }`}
                    >
                      <Icon name="dashboard" className="w-4 h-4" />
                      Painel de Controlo
                    </button>

                    <button 
                      onClick={() => setActiveTab('transactions')}
                      className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left text-sm font-semibold transition ${
                        activeTab === 'transactions' ? 'bg-emerald-50 text-emerald-800 font-bold' : 'hover:bg-slate-50 text-slate-600'
                      }`}
                    >
                      <Icon name="fileText" className="w-4 h-4" />
                      Extrato de Transações ({transactionsFilteredByMonth.length})
                    </button>

                    <button 
                      onClick={() => setActiveTab('accounts')}
                      className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left text-sm font-semibold transition ${
                        activeTab === 'accounts' ? 'bg-emerald-50 text-emerald-800 font-bold' : 'hover:bg-slate-50 text-slate-600'
                      }`}
                    >
                      <Icon name="bank" className="w-4 h-4" />
                      Contas Correntes ({accounts.length})
                    </button>

                    <button 
                      onClick={() => setActiveTab('credit-card')}
                      className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left text-sm font-semibold transition ${
                        activeTab === 'credit-card' ? 'bg-emerald-50 text-emerald-800 font-bold' : 'hover:bg-slate-50 text-slate-600'
                      }`}
                    >
                      <Icon name="creditCard" className="w-4 h-4" />
                      Cartão de Crédito
                    </button>

                    <button 
                      onClick={() => setActiveTab('budgets')}
                      className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left text-sm font-semibold transition ${
                        activeTab === 'budgets' ? 'bg-emerald-50 text-emerald-800 font-bold' : 'hover:bg-slate-50 text-slate-600'
                      }`}
                    >
                      <Icon name="pieChart" className="w-4 h-4" />
                      Limites de Orçamento
                    </button>

                    <button 
                      onClick={() => setActiveTab('goals')}
                      className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left text-sm font-semibold transition ${
                        activeTab === 'goals' ? 'bg-emerald-50 text-emerald-800 font-bold' : 'hover:bg-slate-50 text-slate-600'
                      }`}
                    >
                      <Icon name="piggyBank" className="w-4 h-4" />
                      Objetivos / Poupança ({goals.length})
                    </button>

                    <button 
                      onClick={() => setActiveTab('simulator')}
                      className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left text-sm font-semibold transition ${
                        activeTab === 'simulator' ? 'bg-emerald-50 text-emerald-800 font-bold' : 'hover:bg-slate-50 text-slate-600'
                      }`}
                    >
                      <Icon name="target" className="w-4 h-4" />
                      Simulador de Juros
                    </button>
                  </nav>
                </div>
              </aside>

              {/* Área do Separador Ativo */}
              <main className="lg:col-span-9 flex flex-col gap-6">
                
                {/* 1. SEPARADOR: PAINEL DE CONTROLO */}
                {activeTab === 'dashboard' && (
                  <div className="space-y-6">
                    
                    {/* Quatro Sumários Financeiros */}
                    <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4">
                      <div className="bg-white rounded-2xl p-5 shadow-sm border border-slate-200 flex items-center justify-between">
                        <div>
                          <p className="text-[10px] font-bold text-slate-400 uppercase">Saldo Líquido Total</p>
                          <p className={`text-xl font-black ${stats.balance >= 0 ? 'text-slate-900' : 'text-rose-600 animate-pulse'}`}>
                            R$ {stats.balance.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}
                          </p>
                          {stats.balance < 0 ? (
                            <p className="text-[9px] text-rose-500 mt-1 font-bold">⚠️ Em uso do Cheque Especial</p>
                          ) : (
                            <p className="text-[10px] text-slate-400 mt-1 font-medium">Soma acumulada de contas</p>
                          )}
                        </div>
                        <div className="p-3 bg-indigo-50 text-indigo-600 rounded-xl">
                          <Icon name="dollarSign" className="w-5 h-5" />
                        </div>
                      </div>

                      <div className="bg-white rounded-2xl p-5 shadow-sm border border-slate-200 flex items-center justify-between">
                        <div>
                          <p className="text-[10px] font-bold text-slate-400 uppercase">Receitas (Mês)</p>
                          <p className="text-xl font-black text-emerald-600">
                            + R$ {stats.income.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}
                          </p>
                          <p className="text-[10px] text-slate-400 mt-1">Vencimento no período</p>
                        </div>
                        <div className="p-3 bg-emerald-50 text-emerald-600 rounded-xl">
                          <Icon name="arrowUpRight" className="w-5 h-5" />
                        </div>
                      </div>

                      <div className="bg-white rounded-2xl p-5 shadow-sm border border-slate-200 flex items-center justify-between">
                        <div>
                          <p className="text-[10px] font-bold text-slate-400 uppercase">Despesas Caixa (Mês)</p>
                          <p className="text-xl font-black text-rose-600">
                            - R$ {stats.expense.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}
                          </p>
                          <p className="text-[10px] text-slate-400 mt-1">Vencimento no período</p>
                        </div>
                        <div className="p-3 bg-rose-50 text-rose-600 rounded-xl">
                          <Icon name="arrowDownRight" className="w-5 h-5" />
                        </div>
                      </div>

                      <div className="bg-white rounded-2xl p-5 shadow-sm border border-slate-200 flex items-center justify-between">
                        <div>
                          <p className="text-[10px] font-bold text-slate-400 uppercase">Fatura Crédito (Mês)</p>
                          <p className="text-xl font-black text-amber-600">
                            R$ {activeInvoiceTotal.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}
                          </p>
                          <p className="text-[10px] text-slate-400 mt-1">Valor líquido pendente</p>
                        </div>
                        <div className="p-3 bg-amber-50 text-amber-600 rounded-xl">
                          <Icon name="creditCard" className="w-5 h-5" />
                        </div>
                      </div>
                    </div>

                    {/* Gráficos de Categorias e Dicas */}
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                      
                      {/* Despesas por Categoria */}
                      <div className="bg-white rounded-2xl p-5 shadow-sm border border-slate-200">
                        <h3 className="font-extrabold text-slate-900 text-base mb-4 flex items-center gap-2">
                          <Icon name="pieChart" className="w-5 h-5 text-emerald-600" />
                          Custos por Categoria ({selectedMonth === 'all' ? 'Todos os Períodos' : 'Mês de Vencimento'})
                        </h3>

                        {stats.expense === 0 ? (
                          <div className="flex flex-col items-center justify-center py-12 text-slate-400 text-center space-y-3">
                            <p className="text-xs">Não existem despesas liquidadas com vencimento neste período.</p>
                            <button 
                              onClick={handleGenerateMockData}
                              className="text-xs bg-slate-900 text-white font-bold px-4 py-2.5 rounded-xl hover:bg-slate-800"
                            >
                              Carregar Base Demonstrativa
                            </button>
                          </div>
                        ) : (
                          <div className="space-y-3">
                            {CATEGORIES.despesa.map(cat => {
                              const spent = stats.categoryTotals[cat.id] || 0;
                              const percentage = stats.expense > 0 ? (spent / stats.expense) * 100 : 0;
                              if (spent === 0) return null;

                              return (
                                <div key={cat.id} className="space-y-1">
                                  <div className="flex justify-between items-center text-xs">
                                    <span className="font-medium flex items-center gap-1.5">
                                      <span>{cat.icon}</span>
                                      <span>{cat.name}</span>
                                    </span>
                                    <span className="font-bold text-slate-700">
                                      R$ {spent.toFixed(2)} ({percentage.toFixed(0)}%)
                                    </span>
                                  </div>
                                  <div className="w-full bg-slate-100 rounded-full h-2">
                                    <div className={`h-2 rounded-full ${cat.color}`} style={{ width: `${percentage}%` }}></div>
                                  </div>
                                </div>
                              );
                            })}
                          </div>
                        )}
                      </div>

                      {/* Notificações do Planeador */}
                      <div className="bg-white rounded-2xl p-5 shadow-sm border border-slate-200 flex flex-col justify-between">
                        <div>
                          <h3 className="font-extrabold text-slate-900 text-base mb-4 flex items-center gap-2">
                            <Icon name="helpCircle" className="w-5 h-5 text-emerald-600" />
                            Avisos do Planeador
                          </h3>

                          <div className="space-y-3">
                            {financialTips.length === 0 ? (
                              <p className="text-slate-400 text-xs">A sua saúde financeira está excelente neste período. Continue com os registos!</p>
                            ) : (
                              financialTips.map((tip, idx) => (
                                <div key={idx} className={`p-3 rounded-xl text-xs border flex gap-3 ${
                                  tip.type === 'success' ? 'bg-emerald-50 border-emerald-100 text-emerald-800' :
                                  tip.type === 'warning' ? 'bg-amber-50 border-amber-100 text-amber-800' : 'bg-rose-50 border-rose-100 text-rose-800'
                                }`}>
                                  <span className="shrink-0">{tip.type === 'success' ? '🌟' : tip.type === 'warning' ? '⚠️' : '🚨'}</span>
                                  <span>{tip.text}</span>
                                </div>
                              ))
                            )}
                          </div>
                        </div>
                      </div>

                    </div>

                    {/* Registos Rápidos */}
                    <div className="grid grid-cols-1 md:grid-cols-12 gap-6">
                      
                      {/* Adicionar Transação */}
                      <div className="md:col-span-4 bg-white rounded-2xl p-5 shadow-sm border border-slate-200">
                        <h3 className="font-extrabold text-slate-900 text-base mb-4">Novo Lançamento</h3>
                        <form onSubmit={handleAddTransaction} className="space-y-3">
                          <div>
                            <label className="block text-[10px] uppercase font-bold text-slate-400 mb-1">Descrição</label>
                            <input 
                              type="text" 
                              placeholder="Ex: Supermercado, Prémio"
                              value={newTx.desc}
                              onChange={e => setNewTx(prev => ({ ...prev, desc: e.target.value }))}
                              className="w-full text-xs rounded-xl border border-slate-200 px-3 py-2.5 focus:outline-none focus:ring-1 focus:ring-emerald-500"
                              required
                            />
                          </div>

                          <div className="grid grid-cols-2 gap-2">
                            <div>
                              <label className="block text-[10px] uppercase font-bold text-slate-400 mb-1">Montante Total (R$)</label>
                              <input 
                                type="number" 
                                step="0.01"
                                placeholder="0.00"
                                value={newTx.amount}
                                onChange={e => setNewTx(prev => ({ ...prev, amount: e.target.value }))}
                                className="w-full text-xs rounded-xl border border-slate-200 px-3 py-2.5 focus:outline-none"
                                required
                              />
                            </div>
                            <div>
                              <label className="block text-[10px] uppercase font-bold text-slate-400 mb-1">Estado</label>
                              <select 
                                value={newTx.status}
                                onChange={e => setNewTx(prev => ({ ...prev, status: e.target.value }))}
                                className="w-full text-xs rounded-xl border border-slate-200 px-2.5 py-2.5 focus:outline-none font-semibold text-slate-700"
                              >
                                <option value="liquidado">🟢 Pago / Recebido</option>
                                <option value="pendente">⏳ Pendente</option>
                              </select>
                            </div>
                          </div>

                          {/* Alerta de Cheque Especial no Lançamento */}
                          {overdraftProjectedWarning && (
                            <div className="bg-amber-50 border-l-4 border-amber-500 p-3 rounded-xl text-[11px] text-amber-900 space-y-1">
                              <p className="font-bold flex items-center gap-1 text-xs">
                                <span>⚠️</span> <span>Uso de Cheque Especial Detetado</span>
                              </p>
                              <p>Esta despesa utilizará <strong className="text-rose-600">R$ {overdraftProjectedWarning.requiredOdf.toFixed(2)}</strong> do limite de cheque especial da conta <strong>{overdraftProjectedWarning.accName}</strong>.</p>
                              {overdraftProjectedWarning.exceedsLimit && (
                                <p className="text-[10px] text-rose-600 font-bold leading-tight mt-1">
                                  🚨 ERRO: O valor excede o limite disponível de cheque especial.
                                </p>
                              )}
                            </div>
                          )}

                          {/* Lançamento Parcelado */}
                          {newTx.type === 'despesa' && (
                            <div className="bg-slate-50 p-3 rounded-xl border border-slate-200 space-y-2">
                              <div className="flex items-center gap-2">
                                <input 
                                  type="checkbox" 
                                  id="isInstallmentCheckbox"
                                  checked={isInstallment}
                                  onChange={e => setIsInstallment(e.target.checked)}
                                  className="w-4 h-4 text-emerald-600 focus:ring-emerald-500 rounded"
                                />
                                <label htmlFor="isInstallmentCheckbox" className="text-xs font-bold text-slate-700 cursor-pointer">
                                  Dividir em Prestações
                                </label>
                              </div>

                              {isInstallment && (
                                <div className="space-y-2 pt-1">
                                  <div className="flex items-center gap-3">
                                    <span className="text-xs text-slate-500 shrink-0">Número de parcelas:</span>
                                    <select 
                                      value={installmentsCount}
                                      onChange={e => setInstallmentsCount(parseInt(e.target.value))}
                                      className="flex-1 text-xs rounded-lg border border-slate-200 p-1.5 focus:outline-none font-bold text-slate-800"
                                    >
                                      {[2,3,4,5,6,10,12,18,24,36].map(num => (
                                        <option key={num} value={num}>{num}x</option>
                                      ))}
                                    </select>
                                  </div>
                                </div>
                              )}
                            </div>
                          )}

                          <div className="grid grid-cols-2 gap-2">
                            <div>
                              <label className="block text-[10px] uppercase font-bold text-slate-400 mb-1">Data Registo</label>
                              <input 
                                type="date"
                                value={newTx.date}
                                onChange={e => handleDateChange(e.target.value)}
                                className="w-full text-xs rounded-xl border border-slate-200 px-3 py-2 focus:outline-none"
                              />
                            </div>
                            <div>
                              <label className="block text-[10px] uppercase font-bold text-slate-400 mb-1">Data Vencimento</label>
                              <input 
                                type="date"
                                value={newTx.dueDate}
                                onChange={e => setNewTx(prev => ({ ...prev, dueDate: e.target.value }))}
                                className="w-full text-xs rounded-xl border border-slate-200 px-3 py-2 focus:outline-none font-bold text-slate-900"
                              />
                            </div>
                          </div>

                          <div>
                            <label className="block text-[10px] uppercase font-bold text-slate-400 mb-1">Conta para Vincular</label>
                            <select 
                              value={newTx.accountId || (accounts[0]?.id || 'default-acc')}
                              onChange={e => setNewTx(prev => ({ ...prev, accountId: e.target.value }))}
                              className="w-full text-xs rounded-xl border border-slate-200 px-2.5 py-2.5 focus:outline-none cursor-pointer text-slate-755 font-semibold"
                            >
                              {accountsWithBalances.map(acc => {
                                const totalPower = acc.currentBalance + (parseFloat(acc.overdraftLimit) || 0);
                                return (
                                  <option key={acc.id} value={acc.id}>
                                    {acc.name} (Saldo: R$ {acc.currentBalance.toFixed(2)} | Limite: R$ {totalPower.toFixed(2)})
                                  </option>
                                );
                              })}
                            </select>
                          </div>

                          <div className="grid grid-cols-2 gap-2">
                            <div>
                              <label className="block text-[10px] uppercase font-bold text-slate-400 mb-1">Tipo de Registo</label>
                              <select 
                                value={newTx.type}
                                onChange={e => {
                                  const nt = e.target.value;
                                  setNewTx(prev => ({
                                    ...prev,
                                    type: nt,
                                    category: nt === 'receita' ? CATEGORIES.receita[0].id : CATEGORIES.despesa[0].id
                                  }));
                                  setIsInstallment(false);
                                }}
                                className="w-full text-xs rounded-xl border border-slate-200 px-2 py-2.5 focus:outline-none font-semibold text-slate-705"
                              >
                                <option value="despesa">🔴 Despesa</option>
                                <option value="receita">🟢 Receita</option>
                              </select>
                            </div>
                            <div>
                              <label className="block text-[10px] uppercase font-bold text-slate-400 mb-1">Categoria</label>
                              <select 
                                value={newTx.category}
                                onChange={e => setNewTx(prev => ({ ...prev, category: e.target.value }))}
                                className="w-full text-xs rounded-xl border border-slate-200 px-2 py-2.5 focus:outline-none text-slate-700"
                              >
                                {CATEGORIES[newTx.type].map(c => (
                                  <option key={c.id} value={c.id}>{c.icon} {c.name}</option>
                                ))}
                              </select>
                            </div>
                          </div>

                          <button 
                            type="submit"
                            disabled={overdraftProjectedWarning?.exceedsLimit}
                            className={`w-full mt-2 font-bold py-2.5 rounded-xl text-xs transition shadow ${
                              overdraftProjectedWarning?.exceedsLimit
                                ? 'bg-slate-200 text-slate-400 cursor-not-allowed'
                                : 'bg-slate-900 hover:bg-slate-800 text-white'
                            }`}
                          >
                            {overdraftProjectedWarning?.exceedsLimit ? 'Limite Insuficiente' : isInstallment ? `Confirmar ${installmentsCount} Prestações` : 'Confirmar Lançamento'}
                          </button>
                        </form>
                      </div>

                      {/* Lista de transações do mês de referência */}

                                type="number" 
                                value={ccSettingsForm.limit}
                                onChange={e => setCcSettingsForm(prev => ({ ...prev, limit: e.target.value }))}
                                className="w-full text-xs rounded-xl border border-slate-200 px-3 py-2 focus:outline-none font-bold"
                                required
                              />
                            </div>
                            <div className="grid grid-cols-2 gap-2">
                              <div>
                                <label className="block text-[10px] uppercase font-bold text-slate-400 mb-1">Dia de Fecho</label>
                                <input 
                                  type="number" 
                                  min="1" 
                                  max="31"
                                  value={ccSettingsForm.closingDay}
                                  onChange={e => setCcSettingsForm(prev => ({ ...prev, closingDay: e.target.value }))}
                                  className="w-full text-xs rounded-xl border border-slate-200 px-3 py-2 focus:outline-none"
                                  required
                                />
                              </div>
                              <div>
                                <label className="block text-[10px] uppercase font-bold text-slate-400 mb-1">Dia de Vencimento</label>
                                <input 
                                  type="number" 
                                  min="1" 
                                  max="31"
                                  value={ccSettingsForm.dueDay}
                                  onChange={e => setCcSettingsForm(prev => ({ ...prev, dueDay: e.target.value }))}
                                  className="w-full text-xs rounded-xl border border-slate-200 px-3 py-2 focus:outline-none"
                                  required
                                />
                              </div>
                            </div>
                            <button type="submit" className="w-full bg-slate-950 text-white font-bold py-2 rounded-xl text-xs hover:bg-slate-800 transition shadow">
                              Guardar Ajustes
                            </button>
                          </form>
                        </div>
                      </div>
                    </div>

                    {/* Lançamento e Faturas Mensais */}
                    <div className="grid grid-cols-1 md:grid-cols-12 gap-6">
                      
                      <div className="md:col-span-4 bg-white rounded-3xl p-5 border border-slate-200 h-fit">
                        <h3 className="font-extrabold text-slate-900 text-sm mb-3">Lançar Compra a Crédito</h3>
                        <form onSubmit={handleAddCcTransaction} className="space-y-3">
                          <div>
                            <label className="block text-[10px] uppercase font-bold text-slate-400 mb-1">Descrição do Item</label>
                            <input 
                              type="text" 
                              placeholder="Ex: Telemóvel, Supermercado"
                              value={newCcTx.desc}
                              onChange={e => setNewCcTx(prev => ({ ...prev, desc: e.target.value }))}
                              className="w-full text-xs rounded-xl border border-slate-200 px-3 py-2.5 focus:outline-none focus:ring-1 focus:ring-indigo-500 font-medium"
                              required
                            />
                          </div>
                          <div className="grid grid-cols-2 gap-2">
                            <div>
                              <label className="block text-[10px] uppercase font-bold text-slate-400 mb-1">Valor Total (R$)</label>
                              <input 
                                type="number" 
                                step="0.01"
                                placeholder="0.00"
                                value={newCcTx.amount}
                                onChange={e => setNewCcTx(prev => ({ ...prev, amount: e.target.value }))}
                                className="w-full text-xs rounded-xl border border-slate-200 px-3 py-2.5 focus:outline-none font-bold text-slate-900"
                                required
                              />
                            </div>
                            <div>
                              <label className="block text-[10px] uppercase font-bold text-slate-400 mb-1">Data da Compra</label>
                              <input 
                                type="date"
                                value={newCcTx.date}
                                onChange={e => setNewCcTx(prev => ({ ...prev, date: e.target.value }))}
                                className="w-full text-xs rounded-xl border border-slate-200 px-3 py-2.5 focus:outline-none"
                              />
                            </div>
                          </div>
                          {showLimitWarning && (
                            <div className="bg-rose-50 border-l-4 border-rose-500 p-3 rounded-xl text-[11px] text-rose-800 space-y-1">
                              <p className="font-bold flex items-center gap-1">
                                <span>⚠️</span> <span>Limite do Cartão Excedido</span>
                              </p>
                            </div>
                          )}
                          <div className="bg-slate-50 p-3 rounded-xl border border-slate-200 space-y-2">
                            <div className="flex items-center gap-2">
                              <input 
                                type="checkbox" 
                                id="isCcInstallmentCheckbox"
                                checked={isCcInstallment}
                                onChange={e => setIsCcInstallment(e.target.checked)}
                                className="w-4 h-4 text-indigo-600 focus:ring-indigo-500 rounded"
                              />
                              <label htmlFor="isCcInstallmentCheckbox" className="text-xs font-bold text-slate-700 cursor-pointer">
                                Compra Parcelada / Prestações
                              </label>
                            </div>
                            {isCcInstallment && (
                              <div className="space-y-2 pt-1">
                                <div className="flex items-center gap-3">
                                  <span className="text-xs text-slate-505 shrink-0">Parcelas:</span>
                                  <select 
                                    value={ccInstallmentsCount}
                                    onChange={e => setCcInstallmentsCount(parseInt(e.target.value))}
                                    className="flex-1 text-xs rounded-lg border border-slate-200 p-1.5 focus:outline-none font-bold text-slate-800"
                                  >
                                    {[2,3,4,5,6,10,12,18,24,36].map(num => (
                                      <option key={num} value={num}>{num}x</option>
                                    ))}
                                  </select>
                                </div>
                              </div>
                            )}
                          </div>
                          <div>
                            <label className="block text-[10px] uppercase font-bold text-slate-400 mb-1">Categoria</label>
                            <select 
                              value={newCcTx.category}
                              onChange={e => setNewCcTx(prev => ({ ...prev, category: e.target.value }))}
                              className="w-full text-xs rounded-xl border border-slate-200 px-2.5 py-2.5 focus:outline-none text-slate-700"
                            >
                              {CATEGORIES.despesa.map(c => (
                                <option key={c.id} value={c.id}>{c.icon} {c.name}</option>
                              ))}
                            </select>
                          </div>
                          <button type="submit" className="w-full mt-2 bg-indigo-900 text-white font-bold py-2.5 rounded-xl text-xs hover:bg-indigo-800 transition">
                            Autorizar Crédito
                          </button>
                        </form>
                      </div>

                      {/* Exibição Completa de Faturas com Crédito Lançado */}
                      <div className="md:col-span-8 space-y-4">
                        <div className="flex items-center justify-between">
                          <h3 className="font-extrabold text-slate-900 text-base">Faturas por Ciclo Mensal</h3>
                          <p className="text-xs text-slate-400">Filtrado pelo período selecionado no menu superior</p>
                        </div>
                        {Object.keys(groupedInvoices).length === 0 ? (
                          <div className="bg-white rounded-3xl p-12 text-center text-slate-400 border border-slate-100">
                            <Icon name="creditCard" className="w-12 h-12 text-slate-300 mx-auto mb-3" />
                            <p className="text-xs font-semibold">Não existem faturas criadas ou compras a crédito.</p>
                          </div>
                        ) : (
                          Object.keys(groupedInvoices)
                            .filter(key => selectedMonth === 'all' || key === selectedMonth)
                            .sort((a,b) => b.localeCompare(a))
                            .map(key => {
                              const invoice = groupedInvoices[key];
                              return (
                                <div key={key} className="bg-white rounded-3xl p-6 border border-slate-200 space-y-5 shadow-sm hover:shadow-md transition">
                                  
                                  {/* Topo do Bloco da Fatura */}
                                  <div className="flex items-center justify-between border-b border-slate-100 pb-4 flex-wrap gap-3">
                                    <div>
                                      <h4 className="font-extrabold text-slate-900 text-sm flex items-center gap-2">
                                        <span className="text-lg">📅</span>
                                        <span>Fatura de {invoice.label}</span>
                                      </h4>
                                      <p className="text-[10px] text-slate-400">Total original de compras: R$ {invoice.transactions.filter(t => !t.isCredit).reduce((sum, t) => sum + parseFloat(t.amount), 0).toLocaleString('pt-BR', { minimumFractionDigits: 2 })}</p>
                                    </div>
                                    <div className="flex items-center gap-3">
                                      <div className="text-right">
                                        <p className="text-[9px] uppercase font-bold text-slate-400">Total a Pagar (Líquido)</p>
                                        <p className="font-black text-slate-900 text-base">
                                          R$ {invoice.unpaidTotal.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}
                                        </p>
                                      </div>
                                      
                                      {invoice.isPaid ? (
                                        <span className="bg-emerald-50 text-emerald-700 border border-emerald-200 text-[10px] font-bold px-2.5 py-1 rounded-full shrink-0">
                                          ✓ Paga
                                        </span>
                                      ) : (
                                        <span className="bg-amber-50 text-amber-700 border border-amber-200 text-[10px] font-bold px-2.5 py-1 rounded-full shrink-0">
                                          ⏳ Aberta
                                        </span>
                                      )}
                                    </div>
                                  </div>

                                  {/* Compras e Crédito associados à fatura */}
                                  <div className="space-y-2">
                                    <h5 className="text-[10px] text-slate-400 font-extrabold uppercase tracking-wider mb-2">
                                      Lançamentos da Fatura:
                                    </h5>
                                    
                                    <div className="divide-y divide-slate-100 border border-slate-100 rounded-2xl overflow-hidden bg-slate-50/50">
                                      {invoice.transactions.map(item => {
                                        const isCreditItem = item.isCredit || parseFloat(item.amount) < 0;
                                        const catObj = CATEGORIES.despesa.find(c => c.id === item.category) || { name: 'Geral', icon: '🛒' };
                                        
                                        return (
                                          <div key={item.id} className={`py-3 px-4 flex items-center justify-between text-xs hover:bg-slate-50 transition ${isCreditItem ? 'bg-emerald-50/30' : ''}`}>
                                            
                                            {/* Detalhes do Lançamento */}
                                            <div className="flex items-center gap-3">
                                              <span className="text-base p-1.5 bg-white rounded-xl shadow-sm border border-slate-100">
                                                {isCreditItem ? '💰' : catObj.icon}
                                              </span>
                                              <div>
                                                <p className={`font-semibold ${isCreditItem ? 'text-emerald-800 font-bold' : item.paid ? 'line-through text-slate-400 italic' : 'text-slate-800'}`}>
                                                  {item.desc}
                                                </p>
                                                <p className="text-[9px] text-slate-400 flex items-center gap-1 mt-0.5">
                                                  <span>{isCreditItem ? 'Crédito Adiantado' : catObj.name}</span>
                                                  <span>•</span>
                                                  <span>{new Date(item.date).toLocaleDateString('pt-PT', { timeZone: 'UTC' })}</span>
                                                </p>
                                              </div>
                                            </div>

                                            {/* Preço e Estado */}
                                            <div className="flex items-center gap-3">
                                              <div className="text-right">
                                                <p className={`font-bold font-mono ${isCreditItem ? 'text-emerald-600' : item.paid ? 'text-slate-400 line-through' : 'text-slate-900'}`}>
                                                  {isCreditItem ? '-' : ''} R$ {Math.abs(parseFloat(item.amount)).toLocaleString('pt-BR', { minimumFractionDigits: 2 })}
                                                </p>
                                                {isCreditItem ? (
                                                  <span className="bg-emerald-100 text-emerald-800 text-[8px] font-black px-1.5 py-0.5 rounded uppercase mt-0.5 inline-block">
                                                    Crédito Lançado
                                                  </span>
                                                ) : item.paid ? (
                                                  <span className="bg-slate-100 text-slate-500 text-[8px] font-black px-1.5 py-0.5 rounded uppercase mt-0.5 inline-block">
                                                    Pago
                                                  </span>
                                                ) : (
                                                  <span className="bg-amber-50 text-amber-700 border border-amber-100 text-[8px] font-black px-1.5 py-0.5 rounded uppercase mt-0.5 inline-block">
                                                    A vencer
                                                  </span>
                                                )}
                                              </div>

                                              {/* Ações */}
                                              <div className="flex items-center gap-1 border-l border-slate-200/80 pl-2">
                                                <button 
                                                  onClick={() => openEditCcModal(item)}
                                                  className="text-slate-300 hover:text-indigo-650 transition p-1 hover:bg-white rounded-lg"
                                                  title="Editar"
                                                >
                                                  <Icon name="edit" className="w-3.5 h-3.5" />
                                                </button>
                                                <button 
                                                  onClick={() => handleDeleteCcTransaction(item.id)}
                                                  className="text-slate-300 hover:text-rose-600 transition p-1 hover:bg-white rounded-lg"
                                                  title="Excluir"
                                                >
                                                  <Icon name="trash" className="w-3.5 h-3.5" />
                                                </button>
                                              </div>
                                            </div>

                                          </div>
                                        );
                                      })}
                                    </div>
                                    
                                  </div>

                                  {/* Botão de pagamento de fatura restante */}
                                  {!invoice.isPaid && (
                                    <div className="flex justify-end pt-2 border-t border-slate-100">
                                      <button
                                        onClick={() => setPaymentModal({ isOpen: true, invoiceKey: key, label: invoice.label, total: invoice.unpaidTotal, accountId: '' })}
                                        className="text-[11px] bg-slate-900 hover:bg-slate-800 text-white font-extrabold px-4 py-2.5 rounded-xl transition shadow"
                                      >
                                        💳 Liquidar Saldo da Fatura
                                      </button>
                                    </div>
                                  )}
                                  
                                </div>
                              );
                            })
                        )}
                      </div>

                    </div>
                  </div>
                )}

                {/* 5. SEPARADOR: LIMITES DE ORÇAMENTO */}
                {activeTab === 'budgets' && (
                  <div className="grid grid-cols-1 md:grid-cols-12 gap-6">
                    
                    {/* Formulário de Ajuste */}
                    <div className="md:col-span-4 bg-white rounded-2xl p-5 border border-slate-200 h-fit">
                      <h3 className="font-extrabold text-slate-900 text-base mb-4">Fixar Teto Máximo</h3>
                      <form onSubmit={handleSetBudget} className="space-y-4">
                        <div>
                          <label className="block text-[10px] uppercase font-bold text-slate-400 mb-1">Categoria de Custo</label>
                          <select 
                            value={budgetForm.category}
                            onChange={e => setBudgetForm(prev => ({ ...prev, category: e.target.value }))}
                            className="w-full text-xs rounded-xl border border-slate-200 py-2.5 focus:outline-none text-slate-700 font-semibold cursor-pointer"
                          >
                            {CATEGORIES.despesa.map(c => (
                              <option key={c.id} value={c.id}>{c.icon} {c.name}</option>
                            ))}
                          </select>
                        </div>
                        <div>
                          <label className="block text-[10px] uppercase font-bold text-slate-400 mb-1">Teto Mensal (R$)</label>
                          <input 
                            type="number" 
                            step="10"
                            placeholder="Ex: 500"
                            value={budgetForm.amount}
                            onChange={e => setBudgetForm(prev => ({ ...prev, amount: e.target.value }))}
                            className="w-full text-xs rounded-xl border border-slate-200 px-3 py-2.5 focus:outline-none font-bold"
                            required
                          />
                        </div>
                        <button type="submit" className="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-2.5 rounded-xl text-xs transition">
                          Sincronizar Orçamento
                        </button>
                      </form>
                    </div>

                    {/* Visão de Progresso Real */}
                    <div className="md:col-span-8 bg-white rounded-2xl p-6 border border-slate-200 space-y-4">
                      <div>
                        <h2 className="font-extrabold text-slate-900 text-lg">Acompanhamento de Limites</h2>
                        <p className="text-xs text-slate-400">Verifique em tempo real se os seus gastos ultrapassaram as metas definidas.</p>
                      </div>

                      <div className="space-y-4 pt-2">
                        {CATEGORIES.despesa.map(cat => {
                          const limit = budgets[cat.id] || 0;
                          const spent = stats.categoryTotals[cat.id] || 0;
                          const percent = limit > 0 ? (spent / limit) * 100 : 0;
                          
                          return (
                            <div key={cat.id} className="p-4 border border-slate-100 rounded-2xl bg-slate-50/50 space-y-2">
                              <div className="flex justify-between items-center text-xs">
                                <span className="font-bold text-slate-800 flex items-center gap-1.5">
                                  <span>{cat.icon}</span> <span>{cat.name}</span>
                                </span>
                                <span className="font-semibold text-slate-505">
                                  {limit > 0 ? (
                                    <>Gasto: <strong className="text-slate-800 font-mono">R$ {spent.toFixed(2)}</strong> / Limite: R$ {limit.toFixed(2)}</>
                                  ) : (
                                    <>Gasto: <strong className="text-slate-800 font-mono">R$ {spent.toFixed(2)}</strong> (Sem limite definido)</>
                                  )}
                                </span>
                              </div>
                              
                              {limit > 0 && (
                                <div className="space-y-1">
                                  <div className="w-full bg-slate-250 rounded-full h-2.5 overflow-hidden">
                                    <div 
                                      className={`h-full rounded-full transition-all duration-300 ${percent > 100 ? 'bg-rose-500' : percent > 80 ? 'bg-amber-500' : 'bg-indigo-600'}`}
                                      style={{ width: `${Math.min(100, percent)}%` }}
                                    ></div>
                                  </div>
                                  <div className="flex justify-between items-center text-[9px] font-bold">
                                    <span className={percent > 100 ? 'text-rose-600' : percent > 80 ? 'text-amber-600' : 'text-indigo-600'}>
                                      {percent.toFixed(0)}% Utilizado
                                    </span>
                                    {percent > 100 && (
                                      <span className="text-rose-600 animate-pulse">🚨 Orçamento Estourado!</span>
                                    )}
                                  </div>
                                </div>
                              )}
                            </div>
                          );
                        })}
                      </div>
                    </div>

                  </div>
                )}

                {/* 6. SEPARADOR: METAS DE POUPANÇA */}
                {activeTab === 'goals' && (
                  <div className="grid grid-cols-1 md:grid-cols-12 gap-6">
                    
                    <div className="md:col-span-4 flex flex-col gap-6">
                      
                      {/* Criar Meta */}
                      <div className="bg-white rounded-2xl p-5 border border-slate-200">
                        <h3 className="font-extrabold text-slate-900 text-base mb-4">Nova Meta de Poupança</h3>
                        <form onSubmit={handleCreateGoal} className="space-y-3">
                          <div>
                            <label className="block text-[10px] uppercase font-bold text-slate-400 mb-1">Nome do Objetivo</label>
                            <input 
                              type="text" 
                              placeholder="Ex: Viagem, Carro"
                              value={newGoal.name}
                              onChange={e => setNewGoal(prev => ({ ...prev, name: e.target.value }))}
                              className="w-full text-xs rounded-xl border border-slate-200 px-3 py-2.5 focus:outline-none"
                              required
                            />
                          </div>
                          
                          <div className="grid grid-cols-2 gap-2">
                            <div>
                              <label className="block text-[10px] uppercase font-bold text-slate-400 mb-1">Meta (R$)</label>
                              <input 
                                type="number" 
                                placeholder="3000"
                                value={newGoal.target}
                                onChange={e => setNewGoal(prev => ({ ...prev, target: e.target.value }))}
                                className="w-full text-xs rounded-xl border border-slate-200 px-3 py-2 focus:outline-none"
                                required
                              />
                            </div>
                            <div>
                              <label className="block text-[10px] uppercase font-bold text-slate-400 mb-1">Início (R$)</label>
                              <input 
                                type="number" 
                                placeholder="0"
                                value={newGoal.current}
                                onChange={e => setNewGoal(prev => ({ ...prev, current: e.target.value }))}
                                className="w-full text-xs rounded-xl border border-slate-200 px-3 py-2 focus:outline-none"
                              />
                            </div>
                          </div>

                          <div>
                            <label className="block text-[10px] uppercase font-bold text-slate-400 mb-1">Data Limite</label>
                            <input 
                              type="date"
                              value={newGoal.deadline}
                              onChange={e => setNewGoal(prev => ({ ...prev, deadline: e.target.value }))}
                              className="w-full text-xs rounded-xl border border-slate-200 px-3 py-2 focus:outline-none"
                            />
                          </div>

                          <button type="submit" className="w-full bg-slate-900 text-white font-bold py-2 rounded-xl text-xs">Adicionar Meta</button>
                        </form>
                      </div>

                      {/* Depositar em Meta */}
                      {goals.length > 0 && (
                        <div className="bg-white rounded-2xl p-5 border border-slate-200">
                          <h3 className="font-extrabold text-slate-900 text-base mb-4">Aporte Financeiro</h3>
                          <form onSubmit={handleGoalDeposit} className="space-y-3">
                            <div>
                              <label className="block text-[10px] uppercase font-bold text-slate-400 mb-1">Escolher Meta</label>
                              <select 
                                value={goalDeposit.goalId}
                                onChange={e => setGoalDeposit(prev => ({ ...prev, goalId: e.target.value }))}
                                className="w-full text-xs rounded-xl border border-slate-200 py-2.5 bg-white text-slate-700 font-semibold"
                                required
                              >
                                <option value="">Escolha...</option>
                                {goals.map(g => (
                                  <option key={g.id} value={g.id}>{g.name}</option>
                                ))}
                              </select>
                            </div>
                            <div>
                              <label className="block text-[10px] uppercase font-bold text-slate-400 mb-1">Valor do Depósito (R$)</label>
                              <input 
                                type="number" 
                                step="0.01"
                                placeholder="0.00"
                                value={goalDeposit.amount}
                                onChange={e => setGoalDeposit(prev => ({ ...prev, amount: e.target.value }))}
                                className="w-full text-xs rounded-xl border border-slate-200 px-3 py-2.5 focus:outline-none font-bold"
                                required
                              />
                            </div>
                            <button type="submit" className="w-full bg-indigo-650 hover:bg-indigo-700 text-white font-bold py-2 rounded-xl text-xs transition shadow-sm">
                              Depositar na Meta
                            </button>
                          </form>
                        </div>
                      )}

                    </div>

                    <div className="md:col-span-8 bg-white rounded-3xl p-6 border border-slate-200 space-y-4 h-fit">
                      <div>
                        <h2 className="font-extrabold text-slate-900 text-lg">Acompanhamento das Suas Metas</h2>
                        <p className="text-xs text-slate-400">Poupe com consistência para realizar os seus maiores planos.</p>
                      </div>

                      <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        {goals.map(g => {
                          const targetVal = parseFloat(g.target) || 1;
                          const currentVal = parseFloat(g.current) || 0;
                          const percent = Math.min(100, (currentVal / targetVal) * 100);

                          return (
                            <div key={g.id} className="p-5 border border-slate-100 bg-slate-50/50 rounded-2xl flex flex-col justify-between space-y-3 hover:shadow transition">
                              <div className="flex justify-between items-start">
                                <div>
                                  <h4 className="font-black text-slate-900 text-sm">{g.name}</h4>
                                  <p className="text-[9px] text-slate-400 font-bold uppercase mt-0.5">Prazo: {new Date(g.deadline).toLocaleDateString()}</p>
                                </div>
                                <button onClick={() => handleDeleteGoal(g.id)} className="text-slate-300 hover:text-rose-600 p-1">
                                  <Icon name="trash" className="w-3.5 h-3.5" />
                                </button>
                              </div>

                              <div className="space-y-1 pt-1">
                                <div className="flex justify-between text-[10px] font-bold text-slate-505">
                                  <span>Guardado: <strong className="text-slate-900">R$ {currentVal.toFixed(2)}</strong></span>
                                  <span>Meta: R$ {targetVal.toFixed(2)}</span>
                                </div>
                                <div className="w-full bg-slate-200 rounded-full h-2 overflow-hidden">
                                  <div className="h-full bg-emerald-550 bg-emerald-500 rounded-full transition-all duration-300" style={{ width: `${percent}%` }}></div>
                                </div>
                                <div className="text-right text-[9px] font-extrabold text-emerald-600">{percent.toFixed(0)}% Concluído</div>
                              </div>
                            </div>
                          );
                        })}

                        {goals.length === 0 && (
                          <div className="sm:col-span-2 py-12 text-center text-slate-400 italic">
                            <Icon name="piggyBank" className="w-12 h-12 text-slate-300 mx-auto mb-3" />
                            <span>Não possui metas de poupança no momento.</span>
                          </div>
                        )}
                      </div>
                    </div>

                  </div>
                )}

                {/* 7. SEPARADOR: SIMULADOR DE JUROS COMPOSTOS */}
                {activeTab === 'simulator' && (
                  <div className="bg-white rounded-2xl p-6 border border-slate-200 space-y-6">
                    <div>
                      <h2 className="font-extrabold text-slate-900 text-lg">Simulador de Juros Compostos</h2>
                      <p className="text-xs text-slate-400">Projete os seus investimentos e compare o efeito multiplicador dos juros no tempo.</p>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                      <div className="space-y-1">
                        <label className="block text-[10px] uppercase font-bold text-slate-400">Montante Inicial (R$)</label>
                        <input 
                          type="number" 
                          value={simInitial}
                          onChange={e => setSimInitial(parseFloat(e.target.value) || 0)}
                          className="w-full text-xs rounded-xl border border-slate-200 px-3 py-2.5 focus:outline-none font-bold text-slate-850"
                        />
                      </div>
                      <div className="space-y-1">
                        <label className="block text-[10px] uppercase font-bold text-slate-400">Aporte Mensal (R$)</label>
                        <input 
                          type="number" 
                          value={simMonthly}
                          onChange={e => setSimMonthly(parseFloat(e.target.value) || 0)}
                          className="w-full text-xs rounded-xl border border-slate-200 px-3 py-2.5 focus:outline-none font-bold text-slate-850"
                        />
                      </div>
                      <div className="space-y-1">
                        <label className="block text-[10px] uppercase font-bold text-slate-400">Taxa de Juro Anual (%)</label>
                        <input 
                          type="number" 
                          step="0.1"
                          value={simRate}
                          onChange={e => setSimRate(parseFloat(e.target.value) || 0)}
                          className="w-full text-xs rounded-xl border border-slate-200 px-3 py-2.5 focus:outline-none font-bold text-slate-850"
                        />
                      </div>
                      <div className="space-y-1">
                        <label className="block text-[10px] uppercase font-bold text-slate-400">Tempo de Análise (Anos)</label>
                        <input 
                          type="number" 
                          value={simYears}
                          onChange={e => setSimYears(parseInt(e.target.value) || 0)}
                          className="w-full text-xs rounded-xl border border-slate-200 px-3 py-2.5 focus:outline-none font-bold text-slate-850"
                        />
                      </div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4 border-t border-slate-100 pt-5">
                      <div className="p-4 bg-slate-50 border border-slate-100 rounded-2xl">
                        <p className="text-[10px] text-slate-400 font-bold uppercase">Total Acumulado Bruto</p>
                        <p className="text-xl font-black text-slate-905">R$ {investmentSimulation.finalValue.toLocaleString('pt-BR', { maximumFractionDigits: 0 })}</p>
                      </div>
                      <div className="p-4 bg-slate-50 border border-slate-100 rounded-2xl">
                        <p className="text-[10px] text-slate-400 font-bold uppercase">Total Próprio Investido</p>
                        <p className="text-xl font-black text-slate-700">R$ {investmentSimulation.totalInvested.toLocaleString('pt-BR', { maximumFractionDigits: 0 })}</p>
                      </div>
                      <div className="p-4 bg-emerald-550 bg-emerald-50 border border-emerald-100 rounded-2xl">
                        <p className="text-[10px] text-emerald-805 font-bold uppercase">Total Ganho em Juros</p>
                        <p className="text-xl font-black text-emerald-700">R$ {investmentSimulation.totalGains.toLocaleString('pt-BR', { maximumFractionDigits: 0 })}</p>
                      </div>
                    </div>

                    <div className="overflow-x-auto pt-2">
                      <table className="w-full text-left text-xs">
                        <thead>
                          <tr className="border-b border-slate-150 text-slate-400 font-bold">
                            <th className="pb-2">Tempo decorrido</th>
                            <th className="pb-2">Montante Próprio</th>
                            <th className="pb-2">Lucro Bruto (Juros)</th>
                            <th className="pb-2 text-right">Montante Total</th>
                          </tr>
                        </thead>
                        <tbody className="divide-y divide-slate-50">
                          {investmentSimulation.timeline.map(row => (
                            <tr key={row.year} className="hover:bg-slate-50/50">
                              <td className="py-2.5 font-bold text-slate-700">{row.year} {row.year === 1 ? 'Ano' : 'Anos'}</td>
                              <td className="py-2.5 text-slate-600">R$ {row.invested.toLocaleString()}</td>
                              <td className="py-2.5 text-emerald-650 font-medium">+ R$ {row.gains.toLocaleString()}</td>
                              <td className="py-2.5 text-right font-extrabold text-slate-900">R$ {row.total.toLocaleString()}</td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  </div>
                )}

              </main>
            </div>
          </div>

          <footer className="bg-white border-t py-6 text-center text-[10px] text-slate-400">
            Desenvolvido para gestão pessoal segura com isolamento de dados no Google Firebase Firestore.
          </footer>

        </div>
      );
    }

    // Inicialização da Aplicação no DOM Virtual do React 18
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
