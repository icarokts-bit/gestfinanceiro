<!DOCTYPE html>
<html lang="pt-pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FinançasPro - Sistema de Gestão Financeira Pessoal</title>
  <!-- Tailwind CSS para estilização moderna e premium -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Babel para transpilação de componentes React JSX no browser -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased">

  <!-- Ecrã de carregamento inicial em CSS Puro -->
  <div id="root">
    <div class="min-h-screen flex flex-col items-center justify-center bg-slate-900 text-white p-6">
      <div class="text-center space-y-4 max-w-sm">
        <div class="w-12 h-12 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin mx-auto"></div>
        <h2 class="text-lg font-black tracking-tight">FinançasPro</h2>
        <p class="text-xs text-slate-400">A iniciar os módulos de segurança e a sincronizar os seus registos locais...</p>
      </div>
    </div>
  </div>

  <!-- Bloco único de aplicação React + Firebase -->
  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useMemo } from 'https://esm.sh/react@18.2.0';
    import ReactDOM from 'https://esm.sh/react-dom@18.2.0/client';
    
    // Importações oficiais do Firebase v10 Web SDK via CDN seguro
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { 
      getAuth, 
      signInAnonymously, 
      signInWithCustomToken, 
      onAuthStateChanged 
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { 
      getFirestore, 
      doc, 
      setDoc, 
      getDoc, 
      collection, 
      onSnapshot, 
      addDoc, 
      deleteDoc, 
      updateDoc 
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // ---------------------------------------------------------
    // CONFIGURAÇÃO DO SEU PROJETO FIREBASE (CONECTADA)
    // ---------------------------------------------------------
    const firebaseConfig = {
      apiKey: "AIzaSyCT_lmCQQEvSTfng4pITg7DJ5O-X0gWyXc",
      authDomain: "gestfinanceira-a8a7b.firebaseapp.com",
      projectId: "gestfinanceira-a8a7b",
      storageBucket: "gestfinanceira-a8a7b.firebasestorage.app",
      messagingSenderId: "622341942143",
      appId: "1:622341942143:web:f0fc5c176903d3d71a884a",
      measurementId: "G-84SYMRQ7F6"
    };

    // Inicialização das instâncias do ecossistema Google Cloud
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // ID de isolamento da App para cumprimento da Regra 1
    const appId = 'gestfinanceira-a8a7b';

    // Categorias padrão traduzidas para PT-PT
    const CATEGORIES = {
      receita: [
        { id: 'salario', name: 'Salário', color: 'bg-emerald-500', icon: '💼' },
        { id: 'investimentos', name: 'Rendimentos', color: 'bg-teal-500', icon: '📈' },
        { id: 'freelance', name: 'Trabalho Independente', color: 'bg-indigo-500', icon: '💻' },
        { id: 'outros_rec', name: 'Outras Receitas', color: 'bg-cyan-500', icon: '💵' }
      ],
      despesa: [
        { id: 'moradia', name: 'Habitação / Aluguer', color: 'bg-rose-500', icon: '🏠' },
        { id: 'alimentacao', name: 'Alimentação', color: 'bg-amber-500', icon: '🍔' },
        { id: 'transporte', name: 'Transportes', color: 'bg-blue-500', icon: '🚗' },
        { id: 'lazer', name: 'Lazer e Viagens', color: 'bg-purple-500', icon: '✈️' },
        { id: 'saude', name: 'Saúde', color: 'bg-red-500', icon: '🏥' },
        { id: 'educacao', name: 'Educação', color: 'bg-violet-500', icon: '📚' },
        { id: 'outros_desp', name: 'Outras Despesas', color: 'bg-slate-500', icon: '🛒' }
      ]
    };

    const DEFAULT_BUDGETS = {
      moradia: 1800,
      alimentacao: 1000,
      transporte: 400,
      lazer: 500,
      saude: 300,
      educacao: 500,
      outros_desp: 300
    };

    // ---------------------------------------------------------
    // COMPONENTE DE ÍCONES VETORIAIS (SVG INTEGRADO)
    // ---------------------------------------------------------
    function Icon({ name, className = "w-4 h-4" }) {
      const paths = {
        dashboard: <path d="M3 3h7v9H3zm11 0h7v5h-7zm0 9h7v9h-7zm-11 4h7v5H3z"/>,
        trendingUp: <><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></>,
        fileText: <><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></>,
        pieChart: <><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></>,
        piggyBank: <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17h-2v-2h2v2zm2.07-7.75l-.9.92C13.45 12.9 13 13.5 13 15h-2v-.5c0-1.1.45-2.1 1.17-2.83l1.24-1.26c.37-.36.59-.86.59-1.41 0-1.1-.9-2-2-2s-2 .9-2 2H7c0-2.76 2.24-5 5-5s5 2.24 5 5c0 1.04-.42 1.99-1.07 2.75z" />,
        target: <><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></>,
        dollarSign: <><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></>,
        arrowUpRight: <><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></>,
        arrowDownRight: <><line x1="7" y1="7" x2="17" y2="17"/><polyline points="17 7 17 17 7 17"/></>,
        plus: <><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>,
        trash: <><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></>,
        search: <><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></>,
        alertTriangle: <><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></>,
        download: <><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></>,
        upload: <><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></>,
        checkCircle: <><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></>,
        x: <><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>,
        helpCircle: <><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></>,
        cloud: <path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/>,
        cloudLightning: <><path d="M19 16.9A5 5 0 0 0 18 10h-1.26a8 8 0 1 0-11.62 8.58"/><polyline points="13 11 9 17 12 17 9 23"/></>,
        loader: <><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><circle cx="12" cy="12" r="10" stroke-dasharray="10 5" className="animate-spin" /></>,
        database: <><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/><path d="M3 12c0 1.66 4 3 9 3s9-1.34 9-3"/></>,
        copy: <><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></>,
        check: <polyline points="20 6 9 17 4 12"/>
      };

      return (
        <svg 
          xmlns="http://www.w3.org/2000/svg" 
          viewBox="0 0 24 24" 
          fill="none" 
          stroke="currentColor" 
          strokeWidth="2" 
          strokeLinecap="round" 
          strokeLinejoin="round" 
          className={className}
        >
          {paths[name] || null}
        </svg>
      );
    }

    // ---------------------------------------------------------
    // COMPONENTE PRINCIPAL (APP)
    // ---------------------------------------------------------
    function App() {
      // Estado de Autenticação e Ligação ao Firestore
      const [user, setUser] = useState(null);
      const [loading, setLoading] = useState(true);
      const [dbStatus, setDbStatus] = useState('connecting'); // 'connecting' | 'synced' | 'error'
      const [copied, setCopied] = useState(false);

      // Dados da Aplicação Sincronizados
      const [transactions, setTransactions] = useState([]);
      const [budgets, setBudgets] = useState(DEFAULT_BUDGETS);
      const [goals, setGoals] = useState([]);

      // Estados de UI e Navegação
      const [activeTab, setActiveTab] = useState('dashboard');
      const [notification, setNotification] = useState(null);

      // Formulários e Estados Interativos
      const [newTx, setNewTx] = useState({ desc: '', amount: '', type: 'despesa', category: 'alimentacao', date: new Date().toISOString().split('T')[0] });
      const [goalDeposit, setGoalDeposit] = useState({ goalId: '', amount: '' });
      const [newGoal, setNewGoal] = useState({ name: '', target: '', current: '', deadline: '' });
      const [budgetForm, setBudgetForm] = useState({ category: 'alimentacao', amount: '' });

      // Estados do Simulador de Juros Compostos
      const [simInitial, setSimInitial] = useState(5000);
      const [simMonthly, setSimMonthly] = useState(500);
      const [simRate, setSimRate] = useState(10.5);
      const [simYears, setSimYears] = useState(5);

      // Filtros do extrato de transações
      const [searchQuery, setSearchQuery] = useState('');
      const [filterType, setFilterType] = useState('all');
      const [filterCategory, setFilterCategory] = useState('all');

      const triggerNotification = (message, type = 'success') => {
        setNotification({ message, type });
        setTimeout(() => setNotification(null), 4000);
      };

      // Copiar regras de segurança do Firestore para o Clipboard
      const handleCopyRules = () => {
        const rulesText = `rules_version = '2';\n\nservice cloud.firestore {\n  match /databases/{database}/documents {\n    match /artifacts/\$(appId)/users/{userId}/{collectionName}/{documentId} {\n      allow read, write: if request.auth != null && request.auth.uid == userId;\n    }\n    match /{document=**} {\n      allow read, write: if false;\n    }\n  }\n}`;
        
        const tempInput = document.createElement('textarea');
        tempInput.value = rulesText;
        document.body.appendChild(tempInput);
        tempInput.select();
        document.execCommand('copy');
        document.body.removeChild(tempInput);
        
        setCopied(true);
        triggerNotification('Regras de segurança copiadas com sucesso!');
        setTimeout(() => setCopied(false), 3000);
      };

      // ---------------------------------------------------------
      // MÉTODOS DE BACKUP/FALLBACK AUXILIAR (LOCAL STORAGE)
      // ---------------------------------------------------------
      const loadFromLocalStorage = () => {
        try {
          const localTx = localStorage.getItem('finpro_transactions');
          const localBudgets = localStorage.getItem('finpro_budgets');
          const localGoals = localStorage.getItem('finpro_goals');
          
          if (localTx) setTransactions(JSON.parse(localTx));
          if (localBudgets) setBudgets(JSON.parse(localBudgets));
          if (localGoals) setGoals(JSON.parse(localGoals));
        } catch (e) {
          console.error("Erro ao carregar do armazenamento local:", e);
        }
      };

      const saveToLocalStorage = (txs, budg, gls) => {
        try {
          if (txs) localStorage.setItem('finpro_transactions', JSON.stringify(txs));
          if (budg) localStorage.setItem('finpro_budgets', JSON.stringify(budg));
          if (gls) localStorage.setItem('finpro_goals', JSON.stringify(gls));
        } catch (e) {
          console.error("Erro ao gravar dados localmente:", e);
        }
      };

      // ---------------------------------------------------------
      // 1. SETUP DE AUTENTICAÇÃO COM FALLBACK ROBUSTO (REGRA 3)
      // ---------------------------------------------------------
      useEffect(() => {
        const initAuth = async () => {
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              try {
                await signInWithCustomToken(auth, __initial_auth_token);
              } catch (tokenErr) {
                console.warn("Token customizado incompatível. A efetuar login anónimo de contingência...", tokenErr);
                await signInAnonymously(auth);
              }
            } else {
              await signInAnonymously(auth);
            }
          } catch (err) {
            console.error("Erro crítico na autenticação Firebase:", err);
            setDbStatus('error');
            loadFromLocalStorage();
            triggerNotification('Falha de ligação à nuvem. A usar armazenamento local!', 'warning');
          }
        };
        initAuth();

        const unsubscribe = onAuthStateChanged(auth, (usr) => {
          setUser(usr);
          setLoading(false);
        });

        return () => unsubscribe();
      }, []);

      // ---------------------------------------------------------
      // 2. SINCRONIZAÇÃO EM TEMPO REAL COM FIREBASE (REGRA 1, 3)
      // ---------------------------------------------------------
      useEffect(() => {
        if (!user) return;

        setLoading(true);
        setDbStatus('connecting');

        // Referências estritas conforme Regra 1
        const txCollectionRef = collection(db, 'artifacts', appId, 'users', user.uid, 'transactions');
        const goalsCollectionRef = collection(db, 'artifacts', appId, 'users', user.uid, 'goals');
        const budgetsDocRef = doc(db, 'artifacts', appId, 'users', user.uid, 'budgets', 'limits');

        let active = true;

        const handlePermissionError = (err, contexto) => {
          console.warn(`Erro de permissão ou sincronização silencioso [${contexto}]:`, err);
          if (active) {
            setDbStatus('error');
            setLoading(false);
            loadFromLocalStorage();
          }
        };

        // Regra 2: Obter transações e aplicar lógica de ordenação e filtros em memória no JavaScript
        const unsubTx = onSnapshot(txCollectionRef, 
          (snapshot) => {
            if (!active) return;
            const txList = [];
            snapshot.forEach(docSnap => {
              txList.push({ id: docSnap.id, ...docSnap.data() });
            });
            txList.sort((a, b) => new Date(b.date) - new Date(a.date));
            setTransactions(txList);
            saveToLocalStorage(txList, null, null);
            setDbStatus('synced');
            setLoading(false);
          },
          (err) => handlePermissionError(err, 'transações')
        );

        // Ouvinte em tempo real para Metas de Poupança
        const unsubGoals = onSnapshot(goalsCollectionRef, 
          (snapshot) => {
            if (!active) return;
            const goalsList = [];
            snapshot.forEach(docSnap => {
              goalsList.push({ id: docSnap.id, ...docSnap.data() });
            });
            setGoals(goalsList);
            saveToLocalStorage(null, null, goalsList);
          },
          (err) => handlePermissionError(err, 'metas')
        );

        // Ouvinte em tempo real para Orçamentos (Limites)
        const unsubBudgets = onSnapshot(budgetsDocRef, 
          (docSnap) => {
            if (!active) return;
            if (docSnap.exists()) {
              const data = docSnap.data();
              setBudgets(data);
              saveToLocalStorage(null, data, null);
            } else {
              setDoc(budgetsDocRef, DEFAULT_BUDGETS).catch(() => {});
              setBudgets(DEFAULT_BUDGETS);
              saveToLocalStorage(null, DEFAULT_BUDGETS, null);
            }
          },
          (err) => handlePermissionError(err, 'orçamentos')
        );

        return () => {
          active = false;
          unsubTx();
          unsubGoals();
          unsubBudgets();
        };
      }, [user]);

      // ---------------------------------------------------------
      // 3. OPERAÇÕES DE GRAVAÇÃO (ESCRITAS COM COMPATIBILIDADE LOCAL)
      // ---------------------------------------------------------

      // Adicionar Transação
      const handleAddTransaction = async (e) => {
        e.preventDefault();
        if (!newTx.desc.trim() || !newTx.amount || parseFloat(newTx.amount) <= 0) {
          triggerNotification('Preencha os campos com valores válidos.', 'error');
          return;
        }

        const txData = {
          desc: newTx.desc.trim(),
          amount: parseFloat(newTx.amount),
          type: newTx.type,
          category: newTx.category,
          date: newTx.date || new Date().toISOString().split('T')[0],
          createdAt: new Date().toISOString()
        };

        if (dbStatus === 'synced' && user) {
          try {
            const txCollectionRef = collection(db, 'artifacts', appId, 'users', user.uid, 'transactions');
            await addDoc(txCollectionRef, txData);
            triggerNotification('Transação registada na nuvem!');
          } catch (err) {
            console.error("Erro ao guardar na nuvem, a aplicar localmente:", err);
            saveTxLocally(txData);
          }
        } else {
          saveTxLocally(txData);
        }

        setNewTx({ desc: '', amount: '', type: 'despesa', category: 'alimentacao', date: new Date().toISOString().split('T')[0] });
      };

      const saveTxLocally = (txData) => {
        const localItem = { id: Date.now().toString(), ...txData };
        const updated = [localItem, ...transactions];
        setTransactions(updated);
        saveToLocalStorage(updated, null, null);
        triggerNotification('Guardado localmente (Modo Offline)!');
      };

      // Remover Transação
      const handleDeleteTransaction = async (id) => {
        if (dbStatus === 'synced' && user) {
          try {
            const txDocRef = doc(db, 'artifacts', appId, 'users', user.uid, 'transactions', id);
            await deleteDoc(txDocRef);
            triggerNotification('Transação removida da nuvem!', 'warning');
            return;
          } catch (err) {
            console.error("Erro ao apagar do Firebase:", err);
          }
        }
        
        const updated = transactions.filter(t => t.id !== id);
        setTransactions(updated);
        saveToLocalStorage(updated, null, null);
        triggerNotification('Transação apagada localmente!', 'warning');
      };

      // Criar Meta de Poupança
      const handleCreateGoal = async (e) => {
        e.preventDefault();
        const target = parseFloat(newGoal.target);
        const current = parseFloat(newGoal.current) || 0;

        if (!newGoal.name.trim() || isNaN(target) || target <= 0) {
          triggerNotification('Defina um nome e valor de objetivo válidos.', 'error');
          return;
        }

        const goalData = {
          name: newGoal.name.trim(),
          target,
          current,
          deadline: newGoal.deadline || new Date().toISOString().split('T')[0]
        };

        if (dbStatus === 'synced' && user) {
          try {
            const goalsCollectionRef = collection(db, 'artifacts', appId, 'users', user.uid, 'goals');
            await addDoc(goalsCollectionRef, goalData);
            triggerNotification('Meta de poupança sincronizada!');
          } catch (err) {
            console.error(err);
            saveGoalLocally(goalData);
          }
        } else {
          saveGoalLocally(goalData);
        }

        setNewGoal({ name: '', target: '', current: '', deadline: '' });
      };

      const saveGoalLocally = (goalData) => {
        const localGoal = { id: Date.now().toString(), ...goalData };
        const updated = [...goals, localGoal];
        setGoals(updated);
        saveToLocalStorage(null, null, updated);
        triggerNotification('Meta de poupança adicionada localmente!');
      };

      // Depositar / Aportar em Meta
      const handleGoalDeposit = async (e) => {
        e.preventDefault();
        const amt = parseFloat(goalDeposit.amount);
        if (!goalDeposit.goalId || isNaN(amt) || amt <= 0) {
          triggerNotification('Introduza um montante de depósito válido.', 'error');
          return;
        }

        const selectedGoal = goals.find(g => g.id === goalDeposit.goalId);
        if (!selectedGoal) return;

        const newCurrent = Math.min(selectedGoal.target, selectedGoal.current + amt);

        const autoTx = {
          desc: `Reforço Meta: ${selectedGoal.name}`,
          amount: amt,
          type: 'despesa',
          category: 'outros_desp',
          date: new Date().toISOString().split('T')[0],
          createdAt: new Date().toISOString()
        };

        if (dbStatus === 'synced' && user) {
          try {
            const goalDocRef = doc(db, 'artifacts', appId, 'users', user.uid, 'goals', selectedGoal.id);
            await updateDoc(goalDocRef, { current: newCurrent });

            const txCollectionRef = collection(db, 'artifacts', appId, 'users', user.uid, 'transactions');
            await addDoc(txCollectionRef, autoTx);

            triggerNotification(`R$ ${amt.toFixed(2)} depositados na meta!`);
            return;
          } catch (err) {
            console.error(err);
          }
        }

        // Fallback Local
        const updatedGoals = goals.map(g => g.id === selectedGoal.id ? { ...g, current: newCurrent } : g);
        setGoals(updatedGoals);
        
        const localTx = { id: Date.now().toString(), ...autoTx };
        const updatedTxs = [localTx, ...transactions];
        setTransactions(updatedTxs);

        saveToLocalStorage(updatedTxs, null, updatedGoals);
        setGoalDeposit({ goalId: '', amount: '' });
        triggerNotification(`Reforço de R$ ${amt.toFixed(2)} registado localmente!`);
      };

      // Excluir Meta de Poupança
      const handleDeleteGoal = async (id) => {
        if (dbStatus === 'synced' && user) {
          try {
            const goalDocRef = doc(db, 'artifacts', appId, 'users', user.uid, 'goals', id);
            await deleteDoc(goalDocRef);
            triggerNotification('Meta de poupança removida da nuvem.', 'warning');
            return;
          } catch (err) {
            console.error(err);
          }
        }

        const updated = goals.filter(g => g.id !== id);
        setGoals(updated);
        saveToLocalStorage(null, null, updated);
        triggerNotification('Meta de poupança removida localmente.', 'warning');
      };

      // Atualizar Limite de Orçamento
      const handleSetBudget = async (e) => {
        e.preventDefault();
        const amt = parseFloat(budgetForm.amount);
        if (isNaN(amt) || amt <= 0) {
          triggerNotification('Defina um limite de gastos válido.', 'error');
          return;
        }

        const updatedBudgets = {
          ...budgets,
          [budgetForm.category]: amt
        };

        if (dbStatus === 'synced' && user) {
          try {
            const budgetsDocRef = doc(db, 'artifacts', appId, 'users', user.uid, 'budgets', 'limits');
            await setDoc(budgetsDocRef, updatedBudgets);
            triggerNotification('Limite de despesa atualizado no Firebase!');
          } catch (err) {
            console.error(err);
            saveBudgetLocally(updatedBudgets);
          }
        } else {
          saveBudgetLocally(updatedBudgets);
        }

        setBudgetForm({ category: 'moradia', amount: '' });
      };

      const saveBudgetLocally = (updatedBudgets) => {
        setBudgets(updatedBudgets);
        saveToLocalStorage(null, updatedBudgets, null);
        triggerNotification('Limite de despesa atualizado localmente!');
      };

      // Gerar Dados de Demonstração
      const handleGenerateMockData = async () => {
        const mockTxs = [
          { desc: 'Vencimento / Salário', amount: 5500, type: 'receita', category: 'salario', date: '2026-05-01' },
          { desc: 'Renda da Habitação', amount: 1600, type: 'despesa', category: 'moradia', date: '2026-05-02' },
          { desc: 'Supermercado e Alimentação', amount: 850, type: 'despesa', category: 'alimentacao', date: '2026-05-03' },
          { desc: 'Projeto Freelance Front-End', amount: 1200, type: 'receita', category: 'freelance', date: '2026-05-10' }
        ];

        if (dbStatus === 'synced' && user) {
          try {
            const txCollectionRef = collection(db, 'artifacts', appId, 'users', user.uid, 'transactions');
            for (const m of mockTxs) {
              await addDoc(txCollectionRef, { ...m, createdAt: new Date().toISOString() });
            }
            triggerNotification('Dados de teste salvos na nuvem!');
            return;
          } catch (err) {
            console.error(err);
          }
        }

        const localMockTxs = mockTxs.map((m, idx) => ({ id: `mock-${idx}`, ...m, createdAt: new Date().toISOString() }));
        setTransactions(localMockTxs);
        saveToLocalStorage(localMockTxs, null, null);
        triggerNotification('Dados demonstrativos carregados localmente!');
      };

      // ---------------------------------------------------------
      // 4. MÉTODOS DE CÁLCULO E SIMULAÇÃO
      // ---------------------------------------------------------
      const stats = useMemo(() => {
        let income = 0;
        let expense = 0;
        
        transactions.forEach(t => {
          const amt = parseFloat(t.amount) || 0;
          if (t.type === 'receita') {
            income += amt;
          } else {
            expense += amt;
          }
        });

        const balance = income - expense;
        const savingsRate = income > 0 ? Math.max(0, Math.min(100, ((income - expense) / income) * 100)) : 0;

        const categoryTotals = {};
        transactions.filter(t => t.type === 'despesa').forEach(t => {
          categoryTotals[t.category] = (categoryTotals[t.category] || 0) + parseFloat(t.amount);
        });

        return { income, expense, balance, savingsRate, categoryTotals };
      }, [transactions]);

      // Alertas Inteligentes de Saúde Financeira
      const financialTips = useMemo(() => {
        const tips = [];
        if (stats.savingsRate > 20) {
          tips.push({ type: 'success', text: `Excelente! Conseguiu poupar ${stats.savingsRate.toFixed(1)}% do seu orçamento. Considere investir em longo prazo.` });
        } else if (stats.savingsRate > 0) {
          tips.push({ type: 'info', text: `A sua taxa de poupança situa-se em ${stats.savingsRate.toFixed(1)}%. Tente poupar um pouco mais para atingir a meta recomendada de 20%.` });
        } else if (transactions.length > 0) {
          tips.push({ type: 'danger', text: `Atenção: As suas despesas superaram as receitas este mês. Avalie conter despesas não essenciais.` });
        }

        Object.keys(budgets).forEach(cat => {
          const limit = budgets[cat];
          const spent = stats.categoryTotals[cat] || 0;
          const catObj = CATEGORIES.despesa.find(c => c.id === cat);
          if (catObj && spent > limit && limit > 0) {
            tips.push({ type: 'danger', text: `Orçamento Estourado: Ultrapassou o limite em "${catObj.name}" por R$ ${(spent - limit).toFixed(2)}!` });
          } else if (catObj && limit > 0 && spent > limit * 0.8) {
            tips.push({ type: 'warning', text: `Alerta: Os custos com "${catObj.name}" atingiram mais de 80% do teto definido.` });
          }
        });

        return tips;
      }, [stats, budgets, transactions]);

      // Simulador de Juros Compostos
      const investmentSimulation = useMemo(() => {
        const monthlyRate = Math.pow(1 + (simRate / 100), 1 / 12) - 1;
        const totalMonths = simYears * 12;
        let balance = simInitial;
        let totalInvested = simInitial;
        const timeline = [];

        for (let month = 1; month <= totalMonths; month++) {
          const interestEarned = balance * monthlyRate;
          balance += interestEarned + simMonthly;
          totalInvested += simMonthly;

          if (month % 12 === 0 || month === totalMonths) {
            timeline.push({
              year: month / 12,
              total: Math.round(balance),
              invested: Math.round(totalInvested),
              gains: Math.round(balance - totalInvested)
            });
          }
        }

        return { finalValue: balance, totalInvested, totalGains: balance - totalInvested, timeline };
      }, [simInitial, simMonthly, simRate, simYears]);

      // Filtros Rápidos das Transações em Memória (Evita índices Firestore complexos)
      const filteredTransactions = useMemo(() => {
        return transactions.filter(t => {
          const matchesSearch = t.desc.toLowerCase().includes(searchQuery.toLowerCase());
          const matchesType = filterType === 'all' || t.type === filterType;
          const matchesCategory = filterCategory === 'all' || t.category === filterCategory;
          return matchesSearch && matchesType && matchesCategory;
        });
      }, [transactions, searchQuery, filterType, filterCategory]);

      return (
        <div className="min-h-screen bg-slate-50 text-slate-800 flex flex-col font-sans">
          
          {/* Cabeçalho */}
          <header className="bg-slate-900 text-white sticky top-0 z-40 shadow-md">
            <div className="max-w-7xl mx-auto px-4 py-4 flex flex-col md:flex-row items-center justify-between gap-4">
              <div className="flex items-center gap-3">
                <div className="bg-emerald-500 p-2 rounded-xl text-slate-900 shadow-lg">
                  <Icon name="trendingUp" className="w-6 h-6" />
                </div>
                <div>
                  <h1 className="text-xl font-extrabold tracking-tight">FinançasPro</h1>
                  <p className="text-xs text-slate-400">Motor de Sincronização em Tempo Real</p>
                </div>
              </div>

              {/* Status de Conectividade */}
              <div className="flex items-center gap-2 text-xs font-semibold px-3 py-1.5 rounded-full bg-slate-800 border border-slate-700">
                {dbStatus === 'connecting' && (
                  <>
                    <Icon name="loader" className="w-3.5 h-3.5 text-amber-400 animate-spin" />
                    <span className="text-amber-400">A estabelecer sincronização...</span>
                  </>
                )}
                {dbStatus === 'synced' && (
                  <>
                    <Icon name="cloud" className="w-3.5 h-3.5 text-emerald-400" />
                    <span className="text-emerald-400">Firebase Conectado</span>
                  </>
                )}
                {dbStatus === 'error' && (
                  <>
                    <Icon name="cloudLightning" className="w-3.5 h-3.5 text-amber-500 animate-pulse" />
                    <span className="text-amber-500">Apenas Local (Segurança Firestore Ativa)</span>
                  </>
                )}
              </div>
            </div>
          </header>

          <div className="max-w-7xl mx-auto px-4 py-6 flex-1 w-full flex flex-col">
            
            {/* Banner Informativo sobre as Regras do Firestore */}
            {dbStatus === 'error' && (
              <div className="bg-amber-50 border-l-4 border-amber-500 p-5 rounded-2xl mb-6 shadow-sm">
                <div className="flex flex-col md:flex-row gap-4 items-start justify-between">
                  <div className="flex gap-3">
                    <Icon name="alertTriangle" className="w-5 h-5 text-amber-600 shrink-0 mt-0.5" />
                    <div className="text-xs text-slate-700 space-y-1.5">
                      <p className="font-bold text-sm text-slate-900">Configuração das Regras do Firestore Pendente</p>
                      <p>O seu banco de dados do Firebase Cloud Firestore está a recusar acessos externos porque as regras de segurança padrão (<code className="bg-amber-100 px-1 py-0.5 rounded text-amber-900">if false;</code>) estão ativas.</p>
                      <p className="font-semibold text-amber-900">Siga estes passos rápidos para resolver:</p>
                      <ol className="list-decimal list-inside space-y-1 text-slate-600 bg-white/70 p-3 rounded-xl border border-amber-200">
                        <li>Inicie sessão no Console do Firebase &gt; Cloud Firestore &gt; guia de <strong>Regras (Rules)</strong>.</li>
                        <li>Clique no botão à direita para copiar o modelo de regras otimizado.</li>
                        <li>Substitua o conteúdo no console do Firebase e clique em <strong>Publicar (Publish)</strong>.</li>
                      </ol>
                      <p className="text-[10px] text-slate-400 italic pt-1">Até que as regras sejam aplicadas, as suas alterações estão a ser guardadas localmente (localStorage).</p>
                    </div>
                  </div>

                  <button 
                    onClick={handleCopyRules}
                    className="w-full md:w-auto shrink-0 flex items-center justify-center gap-2 px-4 py-2.5 bg-slate-900 hover:bg-slate-800 text-white font-bold text-xs rounded-xl shadow transition"
                  >
                    <Icon name={copied ? 'check' : 'copy'} className="w-4 h-4" />
                    <span>{copied ? 'Copiado!' : 'Copiar Regras Prontas'}</span>
                  </button>
                </div>
              </div>
            )}

            <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 w-full flex-1">
              
              {/* Navegação Lateral */}
              <aside className="lg:col-span-3 flex flex-col gap-3">
                <div className="bg-white rounded-2xl p-4 shadow-sm border border-slate-200">
                  <p className="text-xs font-semibold uppercase tracking-wider text-slate-400 px-3 mb-2">Menu de Navegação</p>
                  <nav className="flex flex-col gap-1">
                    <button 
                      onClick={() => setActiveTab('dashboard')}
                      className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left text-sm font-semibold transition ${
                        activeTab === 'dashboard' ? 'bg-emerald-50 text-emerald-800 font-bold' : 'hover:bg-slate-50 text-slate-600'
                      }`}
                    >
                      <Icon name="dashboard" className="w-4 h-4" />
                      Painel de Controlo
                    </button>

                    <button 
                      onClick={() => setActiveTab('transactions')}
                      className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left text-sm font-semibold transition ${
                        activeTab === 'transactions' ? 'bg-emerald-50 text-emerald-800 font-bold' : 'hover:bg-slate-50 text-slate-600'
                      }`}
                    >
                      <Icon name="fileText" className="w-4 h-4" />
                      Extrato de Transações ({transactions.length})
                    </button>

                    <button 
                      onClick={() => setActiveTab('budgets')}
                      className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left text-sm font-semibold transition ${
                        activeTab === 'budgets' ? 'bg-emerald-50 text-emerald-800 font-bold' : 'hover:bg-slate-50 text-slate-600'
                      }`}
                    >
                      <Icon name="pieChart" className="w-4 h-4" />
                      Limites de Orçamento
                    </button>

                    <button 
                      onClick={() => setActiveTab('goals')}
                      className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left text-sm font-semibold transition ${
                        activeTab === 'goals' ? 'bg-emerald-50 text-emerald-800 font-bold' : 'hover:bg-slate-50 text-slate-600'
                      }`}
                    >
                      <Icon name="piggyBank" className="w-4 h-4" />
                      Objetivos / Poupança ({goals.length})
                    </button>

                    <button 
                      onClick={() => setActiveTab('simulator')}
                      className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left text-sm font-semibold transition ${
                        activeTab === 'simulator' ? 'bg-emerald-50 text-emerald-800 font-bold' : 'hover:bg-slate-50 text-slate-600'
                      }`}
                    >
                      <Icon name="target" className="w-4 h-4" />
                      Simulador de Juros
                    </button>
                  </nav>
                </div>

                {/* Bloco de Diagnóstico */}
                <div className="bg-white rounded-2xl p-4 border border-slate-200 text-xs text-slate-500 space-y-2">
                  <div className="flex items-center gap-1.5 font-bold text-slate-700">
                    <Icon name="database" className="w-3.5 h-3.5 text-slate-500" />
                    <span>Isolamento e Segurança</span>
                  </div>
                  <p className="break-all font-mono text-[10px]">Utilizador UID: {user?.uid || 'A carregar...'}</p>
                  <p className="italic text-[10px]">O seu ID anónimo garante que todas as transações, orçamentos e limites são completamente privados.</p>
                </div>
              </aside>

              {/* Área do Separador Ativo */}
              <main className="lg:col-span-9 flex flex-col gap-6">
                
                {/* 1. SEPARADOR: PAINEL DE CONTROLO */}
                {activeTab === 'dashboard' && (
                  <div className="space-y-6">
                    
                    {/* Sumários Financeiros */}
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                      <div className="bg-white rounded-2xl p-5 shadow-sm border border-slate-200 flex items-center justify-between">
                        <div>
                          <p className="text-xs font-semibold text-slate-400 uppercase">Saldo Consolidado</p>
                          <p className={`text-2xl font-black ${stats.balance >= 0 ? 'text-slate-900' : 'text-rose-600'}`}>
                            R$ {stats.balance.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}
                          </p>
                          <p className="text-xs text-slate-400 mt-1">Sincronizado na Nuvem</p>
                        </div>
                        <div className="p-3 bg-indigo-50 text-indigo-600 rounded-xl">
                          <Icon name="dollarSign" className="w-5 h-5" />
                        </div>
                      </div>

                      <div className="bg-white rounded-2xl p-5 shadow-sm border border-slate-200 flex items-center justify-between">
                        <div>
                          <p className="text-xs font-semibold text-slate-400 uppercase">Receitas</p>
                          <p className="text-2xl font-black text-emerald-600">
                            + R$ {stats.income.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}
                          </p>
                          <p className="text-xs text-slate-400 mt-1">Total acumulado este mês</p>
                        </div>
                        <div className="p-3 bg-emerald-50 text-emerald-600 rounded-xl">
                          <Icon name="arrowUpRight" className="w-5 h-5" />
                        </div>
                      </div>

                      <div className="bg-white rounded-2xl p-5 shadow-sm border border-slate-200 flex items-center justify-between">
                        <div>
                          <p className="text-xs font-semibold text-slate-400 uppercase">Despesas</p>
                          <p className="text-2xl font-black text-rose-600">
                            - R$ {stats.expense.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}
                          </p>
                          <p className="text-xs text-slate-400 mt-1">Total faturado no mês</p>
                        </div>
                        <div className="p-3 bg-rose-50 text-rose-600 rounded-xl">
                          <Icon name="arrowDownRight" className="w-5 h-5" />
                        </div>
                      </div>
                    </div>

                    {/* Gráficos de Categorias e Dicas */}
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                      
                      {/* Despesas por Categoria */}
                      <div className="bg-white rounded-2xl p-5 shadow-sm border border-slate-200">
                        <h3 className="font-extrabold text-slate-900 text-base mb-4 flex items-center gap-2">
                          <Icon name="pieChart" className="w-5 h-5 text-emerald-600" />
                          Custos por Categoria
                        </h3>

                        {stats.expense === 0 ? (
                          <div className="flex flex-col items-center justify-center py-12 text-slate-400 text-center space-y-3">
                            <p className="text-xs">Não existem despesas registadas no banco de dados.</p>
                            <button 
                              onClick={handleGenerateMockData}
                              className="text-xs bg-slate-900 text-white font-bold px-4 py-2 rounded-xl hover:bg-slate-850"
                            >
                              Carregar Base Demonstrativa
                            </button>
                          </div>
                        ) : (
                          <div className="space-y-3">
                            {CATEGORIES.despesa.map(cat => {
                              const spent = stats.categoryTotals[cat.id] || 0;
                              const percentage = stats.expense > 0 ? (spent / stats.expense) * 100 : 0;
                              if (spent === 0) return null;

                              return (
                                <div key={cat.id} className="space-y-1">
                                  <div className="flex justify-between items-center text-xs">
                                    <span className="font-medium flex items-center gap-1.5">
                                      <span>{cat.icon}</span>
                                      <span>{cat.name}</span>
                                    </span>
                                    <span className="font-bold text-slate-700">
                                      R$ {spent.toFixed(2)} ({percentage.toFixed(0)}%)
                                    </span>
                                  </div>
                                  <div className="w-full bg-slate-100 rounded-full h-2">
                                    <div className={`h-2 rounded-full ${cat.color}`} style={{ width: `${percentage}%` }}></div>
                                  </div>
                                </div>
                              );
                            })}
                          </div>
                        )}
                      </div>

                      {/* Notificações do Planeador */}
                      <div className="bg-white rounded-2xl p-5 shadow-sm border border-slate-200 flex flex-col justify-between">
                        <div>
                          <h3 className="font-extrabold text-slate-900 text-base mb-4 flex items-center gap-2">
                            <Icon name="helpCircle" className="w-5 h-5 text-emerald-600" />
                            Avisos do Planeador
                          </h3>

                          <div className="space-y-3.5">
                            {financialTips.length === 0 ? (
                              <p className="text-slate-400 text-xs">A sua saúde financeira está excelente. Continue com a consistência de registo!</p>
                            ) : (
                              financialTips.map((tip, idx) => (
                                <div key={idx} className={`p-3 rounded-xl text-xs border flex gap-3 ${
                                  tip.type === 'success' ? 'bg-emerald-50 border-emerald-100 text-emerald-800' :
                                  tip.type === 'warning' ? 'bg-amber-50 border-amber-100 text-amber-800' : 'bg-rose-50 border-rose-100 text-rose-800'
                                }`}>
                                  <span>{tip.type === 'success' ? '🌟' : '⚠️'}</span>
                                  <span>{tip.text}</span>
                                </div>
                              ))
                            )}
                          </div>
                        </div>

                        <div className="mt-4 pt-4 border-t border-slate-100 text-[10px] text-center text-slate-400">
                          Dados processados na memória local sem impacto na quota do Cloud Firestore.
                        </div>
                      </div>

                    </div>

                    {/* Registos Rápidos */}
                    <div className="grid grid-cols-1 md:grid-cols-12 gap-6">
                      
                      {/* Adicionar Transação */}
                      <div className="md:col-span-4 bg-white rounded-2xl p-5 shadow-sm border border-slate-200">
                        <h3 className="font-extrabold text-slate-900 text-base mb-4">Novo Registo</h3>
                        <form onSubmit={handleAddTransaction} className="space-y-3">
                          <div>
                            <label className="block text-[10px] uppercase font-bold text-slate-400 mb-1">Descrição</label>
                            <input 
                              type="text" 
                              placeholder="Ex: Supermercado, Prémio"
                              value={newTx.desc}
                              onChange={e => setNewTx(prev => ({ ...prev, desc: e.target.value }))}
                              className="w-full text-xs rounded-xl border border-slate-200 px-3 py-2.5 focus:outline-none focus:ring-1 focus:ring-emerald-500"
                              required
                            />
                          </div>

                          <div className="grid grid-cols-2 gap-2">
                            <div>
                              <label className="block text-[10px] uppercase font-bold text-slate-400 mb-1">Montante (R$)</label>
                              <input 
                                type="number" 
                                step="0.01"
                                placeholder="0.00"
                                value={newTx.amount}
                                onChange={e => setNewTx(prev => ({ ...prev, amount: e.target.value }))}
                                className="w-full text-xs rounded-xl border border-slate-200 px-3 py-2.5 focus:outline-none"
                                required
                              />
                            </div>
                            <div>
                              <label className="block text-[10px] uppercase font-bold text-slate-400 mb-1">Data</label>
                              <input 
                                type="date"
                                value={newTx.date}
                                onChange={e => setNewTx(prev => ({ ...prev, date: e.target.value }))}
                                className="w-full text-xs rounded-xl border border-slate-200 px-3 py-2 focus:outline-none"
                              />
                            </div>
                          </div>

                          <div className="grid grid-cols-2 gap-2">
                            <div>
                              <label className="block text-[10px] uppercase font-bold text-slate-400 mb-1">Tipo de Registo</label>
                              <select 
                                value={newTx.type}
                                onChange={e => {
                                  const nt = e.target.value;
                                  setNewTx(prev => ({
                                    ...prev,
                                    type: nt,
                                    category: nt === 'receita' ? CATEGORIES.receita[0].id : CATEGORIES.despesa[0].id
                                  }));
                                }}
                                className="w-full text-xs rounded-xl border border-slate-200 px-2 py-2.5 focus:outline-none"
                              >
                                <option value="despesa">🔴 Despesa</option>
                                <option value="receita">🟢 Receita</option>
                              </select>
                            </div>
                            <div>
                              <label className="block text-[10px] uppercase font-bold text-slate-400 mb-1">Categoria</label>
                              <select 
                                value={newTx.category}
                                onChange={e => setNewTx(prev => ({ ...prev, category: e.target.value }))}
                                className="w-full text-xs rounded-xl border border-slate-200 px-2 py-2.5 focus:outline-none"
                              >
                                {CATEGORIES[newTx.type].map(c => (
                                  <option key={c.id} value={c.id}>{c.icon} {c.name}</option>
                                ))}
                              </select>
                            </div>
                          </div>

                          <button 
                            type="submit"
                            className="w-full mt-2 bg-slate-900 text-white font-bold py-2.5 rounded-xl text-xs hover:bg-slate-800 transition"
                          >
                            Confirmar Lançamento
                          </button>
                        </form>
                      </div>

                      {/* Lista de transações */}
                      <div className="md:col-span-8 bg-white rounded-2xl p-5 shadow-sm border border-slate-200">
                        <div className="flex justify-between items-center mb-4">
                          <h3 className="font-extrabold text-slate-900 text-base">Últimos Lançamentos Sincronizados</h3>
                          <button onClick={() => setActiveTab('transactions')} className="text-xs text-emerald-600 font-bold hover:underline">
                            Ver Extrato
                          </button>
                        </div>

                        <div className="overflow-x-auto">
                          <table className="w-full text-left text-xs">
                            <thead>
                              <tr className="border-b border-slate-100 text-slate-400 font-semibold">
                                <th className="pb-3 text-[10px] uppercase">Descrição</th>
                                <th className="pb-3 text-[10px] uppercase">Data</th>
                                <th className="pb-3 text-[10px] uppercase text-right">Valor</th>
                                <th className="pb-3"></th>
                              </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-50">
                              {transactions.slice(0, 5).map(t => {
                                const isInc = t.type === 'receita';
                                const catList = isInc ? CATEGORIES.receita : CATEGORIES.despesa;
                                const catObj = catList.find(c => c.id === t.category) || { name: 'Geral', icon: '💸' };

                                return (
                                  <tr key={t.id} className="hover:bg-slate-50/50">
                                    <td className="py-3">
                                      <div className="font-semibold text-slate-800">{t.desc}</div>
                                      <div className="text-[10px] text-slate-400 flex items-center gap-1">
                                        <span>{catObj.icon}</span>
                                        <span>{catObj.name}</span>
                                      </div>
                                    </td>
                                    <td className="py-3 text-slate-500">{new Date(t.date).toLocaleDateString('pt-PT', { timeZone: 'UTC' })}</td>
                                    <td className={`py-3 font-extrabold text-right ${isInc ? 'text-emerald-600' : 'text-slate-800'}`}>
                                      {isInc ? '+' : '-'} R$ {t.amount.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}
                                    </td>
                                    <td className="py-3 text-right">
                                      <button onClick={() => handleDeleteTransaction(t.id)} className="text-slate-300 hover:text-rose-600 p-1">
                                        <Icon name="trash" className="w-4 h-4" />
                                      </button>
                                    </td>
                                  </tr>
                                );
                              })}

                              {transactions.length === 0 && (
                                <tr>
                                  <td colSpan="4" className="py-8 text-center text-slate-400 italic">
                                    Sem dados registados na nuvem. Comece por adicionar um lançamento!
                                  </td>
                                </tr>
                              )}
                            </tbody>
                          </table>
                        </div>
                      </div>

                    </div>

                  </div>
                )}

                {/* 2. SEPARADOR: EXTRATO COMPLETO */}
                {activeTab === 'transactions' && (
                  <div className="bg-white rounded-2xl p-6 shadow-sm border border-slate-200">
                    <div className="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-6">
                      <div>
                        <h2 className="text-lg font-black text-slate-900">Extrato Consolidado</h2>
                        <p className="text-xs text-slate-400">Consulte, pesquise e filtre todas as suas movimentações de conta.</p>
                      </div>

                      <div className="flex flex-wrap gap-2">
                        <div className="relative">
                          <Icon name="search" className="w-3.5 h-3.5 absolute left-3 top-3 text-slate-400" />
                          <input 
                            type="text" 
                            placeholder="Procurar transação..."
                            value={searchQuery}
                            onChange={e => setSearchQuery(e.target.value)}
                            className="pl-8 pr-4 py-2 rounded-xl border border-slate-200 text-xs focus:outline-none"
                          />
                        </div>

                        <select value={filterType} onChange={e => setFilterType(e.target.value)} className="border border-slate-200 text-xs rounded-xl px-2.5 py-2">
                          <option value="all">Filtro de Fluxo</option>
                          <option value="receita">Receitas</option>
                          <option value="despesa">Despesas</option>
                        </select>

                        <select value={filterCategory} onChange={e => setFilterCategory(e.target.value)} className="border border-slate-200 text-xs rounded-xl px-2.5 py-2">
                          <option value="all">Categorias</option>
                          {CATEGORIES.receita.map(c => <option key={c.id} value={c.id}>🟢 {c.name}</option>)}
                          {CATEGORIES.despesa.map(c => <option key={c.id} value={c.id}>🔴 {c.name}</option>)}
                        </select>
                      </div>
                    </div>

                    <div className="overflow-x-auto">
                      <table className="w-full text-left text-xs">
                        <thead>
                          <tr className="border-b border-slate-100 text-slate-400 font-semibold">
                            <th className="pb-3">Descrição</th>
                            <th className="pb-3">Categoria</th>
                            <th className="pb-3">Data de Registo</th>
                            <th className="pb-3 text-right">Montante</th>
                            <th className="pb-3"></th>
                          </tr>
                        </thead>
                        <tbody className="divide-y divide-slate-50">
                          {filteredTransactions.map(t => {
                            const isInc = t.type === 'receita';
                            const catList = isInc ? CATEGORIES.receita : CATEGORIES.despesa;
                            const catObj = catList.find(c => c.id === t.category) || { name: 'Outros', icon: '💸' };

                            return (
                              <tr key={t.id} className="hover:bg-slate-50/50">
                                <td className="py-4 font-semibold text-slate-900">{t.desc}</td>
                                <td className="py-4">
                                  <span className="inline-flex items-center gap-1.5 bg-slate-50 border px-2.5 py-0.5 rounded-full font-medium">
                                    <span>{catObj.icon}</span>
                                    <span>{catObj.name}</span>
                                  </span>
                                </td>
                                <td className="py-4 text-slate-500">{new Date(t.date).toLocaleDateString('pt-PT', { timeZone: 'UTC' })}</td>
                                <td className={`py-4 font-extrabold text-right ${isInc ? 'text-emerald-600' : 'text-slate-800'}`}>
                                  {isInc ? '+' : '-'} R$ {t.amount.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}
                                </td>
                                <td className="py-4 text-right">
                                  <button onClick={() => handleDeleteTransaction(t.id)} className="text-slate-300 hover:text-rose-600">
                                    <Icon name="trash" className="w-4 h-4" />
                                  </button>
                                </td>
                              </tr>
                            );
                          })}
                        </tbody>
                      </table>
                    </div>
                  </div>
                )}

                {/* 3. SEPARADOR: LIMITES DE ORÇAMENTO */}
                {activeTab === 'budgets' && (
                  <div className="grid grid-cols-1 md:grid-cols-12 gap-6">
                    <div className="md:col-span-4 bg-white rounded-2xl p-5 border border-slate-200">
                      <h3 className="font-extrabold text-slate-900 text-base mb-4">Fixar Teto Máximo</h3>
                      <form onSubmit={handleSetBudget} className="space-y-4">
                        <div>
                          <label className="block text-[10px] uppercase font-bold text-slate-400 mb-1">Categoria de Custo</label>
                          <select 
                            value={budgetForm.category}
                            onChange={e => setBudgetForm(prev => ({ ...prev, category: e.target.value }))}
                            className="w-full text-xs rounded-xl border border-slate-200 py-2.5 focus:outline-none"
                          >
                            {CATEGORIES.despesa.map(c => (
                              <option key={c.id} value={c.id}>{c.icon} {c.name}</option>
                            ))}
                          </select>
                        </div>

                        <div>
                          <label className="block text-[10px] uppercase font-bold text-slate-400 mb-1">Teto Mensal (R$)</label>
                          <input 
                            type="number" 
                            value={budgetForm.amount}
                            onChange={e => setBudgetForm(prev => ({ ...prev, amount: e.target.value }))}
                            placeholder="Ex: 500"
                            className="w-full text-xs rounded-xl border border-slate-200 py-2 focus:outline-none"
                            required
                          />
                        </div>

                        <button type="submit" className="w-full bg-slate-900 text-white font-bold py-2 rounded-xl text-xs">
                          Sincronizar Orçamento
                        </button>
                      </form>
                    </div>

                    <div className="md:col-span-8 bg-white rounded-2xl p-6 border border-slate-200 space-y-4">
                      <div>
                        <h2 className="font-extrabold text-slate-900 text-lg">Acompanhamento de Limites</h2>
                        <p className="text-xs text-slate-400">Garanta o controlo das despesas em relação aos limites de poupança definidos.</p>
                      </div>

                      <div className="space-y-4">
                        {CATEGORIES.despesa.map(cat => {
                          const limit = budgets[cat.id] || 0;
                          const spent = stats.categoryTotals[cat.id] || 0;
                          const pct = limit > 0 ? (spent / limit) * 100 : 0;

                          let col = 'bg-emerald-500';
                          if (pct >= 100) col = 'bg-rose-500';
                          else if (pct >= 80) col = 'bg-amber-500';

                          return (
                            <div key={cat.id} className="p-4 border rounded-xl space-y-2">
                              <div className="flex justify-between items-center text-xs">
                                <span className="font-bold flex items-center gap-1">
                                  <span>{cat.icon}</span>
                                  <span>{cat.name}</span>
                                </span>
                                <span className="font-bold text-slate-700">
                                  R$ {spent.toFixed(2)} / R$ {limit > 0 ? limit.toFixed(2) : 'Sem teto fixado'}
                                </span>
                              </div>

                              {limit > 0 && (
                                <div className="w-full bg-slate-100 rounded-full h-2 overflow-hidden">
                                  <div className={`h-2 rounded-full ${col}`} style={{ width: `${Math.min(100, pct)}%` }}></div>
                                </div>
                              )}
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  </div>
                )}

                {/* 4. SEPARADOR: METAS DE POUPANÇA */}
                {activeTab === 'goals' && (
                  <div className="grid grid-cols-1 md:grid-cols-12 gap-6">
                    <div className="md:col-span-4 flex flex-col gap-6">
                      <div className="bg-white rounded-2xl p-5 border border-slate-200">
                        <h3 className="font-extrabold text-slate-900 text-base mb-4">Nova Meta de Poupança</h3>
                        <form onSubmit={handleCreateGoal} className="space-y-3">
                          <div>
                            <label className="block text-[10px] uppercase font-bold text-slate-400 mb-1">Nome do Objetivo</label>
                            <input 
                              type="text" 
                              placeholder="Ex: Viagem, Carro"
                              value={newGoal.name}
                              onChange={e => setNewGoal(prev => ({ ...prev, name: e.target.value }))}
                              className="w-full text-xs rounded-xl border border-slate-200 py-2.5 focus:outline-none"
                              required
                            />
                          </div>

                          <div className="grid grid-cols-2 gap-2">
                            <div>
                              <label className="block text-[10px] uppercase font-bold text-slate-400 mb-1">Alvo (R$)</label>
                              <input 
                                type="number" 
                                placeholder="Alvo"
                                value={newGoal.target}
                                onChange={e => setNewGoal(prev => ({ ...prev, target: e.target.value }))}
                                className="w-full text-xs rounded-xl border border-slate-200 py-2 focus:outline-none"
                                required
                              />
                            </div>
                            <div>
                              <label className="block text-[10px] uppercase font-bold text-slate-400 mb-1">Já tenho (R$)</label>
                              <input 
                                type="number" 
                                placeholder="Inicial"
                                value={newGoal.current}
                                onChange={e => setNewGoal(prev => ({ ...prev, current: e.target.value }))}
                                className="w-full text-xs rounded-xl border border-slate-200 py-2 focus:outline-none"
                              />
                            </div>
                          </div>

                          <button type="submit" className="w-full bg-slate-900 text-white font-bold py-2 rounded-xl text-xs">
                            Adicionar Meta
                          </button>
                        </form>
                      </div>

                      <div className="bg-white rounded-2xl p-5 border border-slate-200">
                        <h3 className="font-extrabold text-slate-900 text-base mb-4">Reforço de Poupança</h3>
                        <form onSubmit={handleGoalDeposit} className="space-y-3">
                          <div>
                            <label className="block text-[10px] uppercase font-bold text-slate-400 mb-1">Meta</label>
                            <select 
                              value={goalDeposit.goalId} 
                              onChange={e => setGoalDeposit(prev => ({ ...prev, goalId: e.target.value }))}
                              className="w-full text-xs rounded-xl border border-slate-200 py-2 focus:outline-none"
                            >
                              <option value="">Selecione...</option>
                              {goals.map(g => <option key={g.id} value={g.id}>{g.name}</option>)}
                            </select>
                          </div>

                          <div>
                            <label className="block text-[10px] uppercase font-bold text-slate-400 mb-1">Montante (R$)</label>
                            <input 
                              type="number" 
                              placeholder="Valor"
                              value={goalDeposit.amount}
                              onChange={e => setGoalDeposit(prev => ({ ...prev, amount: e.target.value }))}
                              className="w-full text-xs rounded-xl border border-slate-200 py-2 focus:outline-none"
                            />
                          </div>

                          <button type="submit" className="w-full bg-emerald-600 text-white font-bold py-2 rounded-xl text-xs">
                            Efetuar Depósito
                          </button>
                        </form>
                      </div>
                    </div>

                    <div className="md:col-span-8 bg-white rounded-2xl p-6 border border-slate-200 space-y-4">
                      <h2 className="font-extrabold text-slate-900 text-lg">Metas de Poupança Ativas</h2>
                      <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        {goals.map(g => {
                          const pct = Math.min(100, (g.current / g.target) * 100);

                          return (
                            <div key={g.id} className="p-4 border rounded-2xl flex flex-col justify-between space-y-3 bg-slate-50/50">
                              <div className="flex justify-between items-start">
                                <div>
                                  <h4 className="font-bold text-slate-800 text-sm">{g.name}</h4>
                                  <p className="text-[10px] text-slate-400">Prazo de Resgate: {new Date(g.deadline).toLocaleDateString('pt-PT', { timeZone: 'UTC' })}</p>
                                </div>
                                <button onClick={() => handleDeleteGoal(g.id)} className="text-slate-300 hover:text-rose-600">
                                  <Icon name="x" className="w-4.5 h-4.5" />
                                </button>
                              </div>

                              <div className="grid grid-cols-2 text-xs font-semibold">
                                <span>Poupado: R$ {g.current.toLocaleString()}</span>
                                <span className="text-right text-slate-400">Objetivo: R$ {g.target.toLocaleString()}</span>
                              </div>

                              <div className="space-y-1">
                                <div className="w-full bg-slate-100 rounded-full h-1.5 overflow-hidden">
                                  <div className="h-1.5 rounded-full bg-indigo-600" style={{ width: `${pct}%` }}></div>
                                </div>
                                <div className="flex justify-between text-[10px] font-bold text-slate-500">
                                  <span>{pct.toFixed(0)}% guardado</span>
                                  {pct >= 100 && <span className="text-emerald-600">Alcançado! 🎉</span>}
                                </div>
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  </div>
                )}

                {/* 5. SEPARADOR: SIMULADOR DE JUROS COMPOSTOS */}
                {activeTab === 'simulator' && (
                  <div className="bg-white rounded-2xl p-6 border border-slate-200 space-y-6">
                    <div>
                      <h2 className="font-extrabold text-slate-900 text-lg">Simulador de Juros Compostos</h2>
                      <p className="text-xs text-slate-400">Projete a evolução do seu portefólio financeiro através de depósitos constantes.</p>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-4 gap-4 p-4 bg-slate-50 rounded-xl">
                      <div>
                        <label className="block text-[10px] font-bold text-slate-500 mb-1">Aporte Inicial (R$)</label>
                        <input type="number" value={simInitial} onChange={e => setSimInitial(parseFloat(e.target.value) || 0)} className="w-full py-2 px-3 border rounded-xl text-xs font-semibold" />
                      </div>
                      <div>
                        <label className="block text-[10px] font-bold text-slate-500 mb-1">Aporte Mensal (R$)</label>
                        <input type="number" value={simMonthly} onChange={e => setSimMonthly(parseFloat(e.target.value) || 0)} className="w-full py-2 px-3 border rounded-xl text-xs font-semibold" />
                      </div>
                      <div>
                        <label className="block text-[10px] font-bold text-slate-500 mb-1">Taxa de Juro (% a.a.)</label>
                        <input type="number" step="0.1" value={simRate} onChange={e => setSimRate(parseFloat(e.target.value) || 0)} className="w-full py-2 px-3 border rounded-xl text-xs font-semibold" />
                      </div>
                      <div>
                        <label className="block text-[10px] font-bold text-slate-500 mb-1">Prazo (Anos)</label>
                        <select value={simYears} onChange={e => setSimYears(parseInt(e.target.value) || 1)} className="w-full py-2 px-3 border rounded-xl text-xs font-semibold">
                          <option value="1">1 Ano</option>
                          <option value="3">3 Anos</option>
                          <option value="5">5 Anos</option>
                          <option value="10">10 Anos</option>
                          <option value="20">20 Anos</option>
                        </select>
                      </div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                      <div className="p-4 bg-indigo-50 rounded-xl text-indigo-900">
                        <span className="text-[10px] font-bold uppercase block text-indigo-600">Montante Final Acumulado</span>
                        <span className="text-xl font-black">R$ {investmentSimulation.finalValue.toLocaleString('pt-BR', { maximumFractionDigits: 0 })}</span>
                      </div>
                      <div className="p-4 bg-emerald-50 rounded-xl text-emerald-900">
                        <span className="text-[10px] font-bold uppercase block text-emerald-650">Total Capital Poupado</span>
                        <span className="text-xl font-black">R$ {investmentSimulation.totalInvested.toLocaleString('pt-BR', { maximumFractionDigits: 0 })}</span>
                      </div>
                      <div className="p-4 bg-amber-50 rounded-xl text-amber-900">
                        <span className="text-[10px] font-bold uppercase block text-amber-600">Juros Totais Obtidos</span>
                        <span className="text-xl font-black">R$ {investmentSimulation.totalGains.toLocaleString('pt-BR', { maximumFractionDigits: 0 })}</span>
                      </div>
                    </div>
                  </div>
                )}

              </main>
            </div>
          </div>

          <footer className="bg-white border-t py-6 text-center text-[10px] text-slate-400">
            Desenvolvido para gestão pessoal segura com isolamento de dados no Google Firebase Firestore.
          </footer>

        </div>
      );
    }

    // Inicialização da Aplicação no DOM Virtual do React 18
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
