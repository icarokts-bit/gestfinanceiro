        <h2 class="text-lg font-black tracking-tight">FinançasPro</h2>
        <p class="text-xs text-slate-400">A iniciar os módulos de segurança e a sincronizar os seus registos locais...</p>
      </div>
    </div>
  </div>

  <!-- Bloco único de aplicação React + Firebase -->
  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useMemo } from 'https://esm.sh/react@18.2.0';
    import ReactDOM from 'https://esm.sh/react-dom@18.2.0/client';
    
    // Importações oficiais do Firebase v10 Web SDK via CDN seguro

    const firebaseConfig = {

        { id: 'salario', name: 'Salário', color: 'bg-emerald-500', icon: '💼' },
        { id: 'investimentos', name: 'Rendimentos', color: 'bg-teal-500', icon: '📈' },
        { id: 'freelance', name: 'Trabalho Independente', color: 'bg-indigo-500', icon: '💻' },

        { id: 'transporte', name: 'Transportes', color: 'bg-blue-500', icon: '🚗' },
        { id: 'lazer', name: 'Lazer e Viagens', color: 'bg-purple-500', icon: '✈️' },
        { id: 'saude', name: 'Saúde', color: 'bg-red-500', icon: '🏥' },

    const DEFAULT_BUDGETS = {

      alimentacao: 1000,
      transporte: 400,

      saude: 300,
      educacao: 500,

    };

    const DEFAULT_CC_SETTINGS = {
      limit: 3000,
      closingDay: 5,
      dueDay: 15,
      cardName: "Crédito Visa Platinum"
    };

    // ---------------------------------------------------------
    // COMPONENTE DE ÍCONES VETORIAIS (SVG INTEGRADO)
    // ---------------------------------------------------------
    function Icon({ name, className = "w-4 h-4" }) {
      const paths = {
        dashboard: <path d="M3 3h7v9H3zm11 0h7v5h-7zm0 9h7v9h-7zm-11 4h7v5H3z"/>,
        trendingUp: <><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></>,
        fileText: <><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></>,
        pieChart: <><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></>,
        piggyBank: <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17h-2v-2h2v2zm2.07-7.75l-.9.92C13.45 12.9 13 13.5 13 15h-2v-.5c0-1.1.45-2.1 1.17-2.83l1.24-1.26c.37-.36.59-.86.59-1.41 0-1.1-.9-2-2-2s-2 .9-2 2H7c0-2.76 2.24-5 5-5s5 2.24 5 5c0 1.04-.42 1.99-1.07 2.75z" />,
        target: <><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></>,
        dollarSign: <><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></>,
        arrowUpRight: <><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></>,
        arrowDownRight: <><line x1="7" y1="7" x2="17" y2="17"/><polyline points="17 7 17 17 7 17"/></>,
        plus: <><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>,
        trash: <><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></>,
        search: <><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></>,
        alertTriangle: <><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></>,
        download: <><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></>,
        upload: <><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></>,
        checkCircle: <><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></>,
        x: <><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>,
        helpCircle: <><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></>,
        cloud: <path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/>,
        cloudLightning: <><path d="M19 16.9A5 5 0 0 0 18 10h-1.26a8 8 0 1 0-11.62 8.58"/><polyline points="13 11 9 17 12 17 9 23"/></>,
        loader: <><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><circle cx="12" cy="12" r="10" stroke-dasharray="10 5" className="animate-spin" /></>,
        database: <><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/><path d="M3 12c0 1.66 4 3 9 3s9-1.34 9-3"/></>,
        copy: <><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></>,
        check: <polyline points="20 6 9 17 4 12"/>,
        creditCard: <><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/><path d="M4 16h4"/></>,
        settings: <><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></>,
        bank: <><rect x="3" y="21" width="18" height="2"/><rect x="5" y="10" width="2" height="11"/><rect x="11" y="10" width="2" height="11"/><rect x="17" y="10" width="2" height="11"/><polygon points="12 2 2 9 22 9 12 2"/></>,
        edit: <path d="M12 20h9M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>,
        chevronLeft: <polyline points="15 18 9 12 15 6"/>,
        chevronRight: <polyline points="9 18 15 12 9 6"/>
      };

      return (
        <svg 
          xmlns="http://www.w3.org/2000/svg" 
          viewBox="0 0 24 24" 
          fill="none" 
          stroke="currentColor" 
          strokeWidth="2" 
          strokeLinecap="round" 
          strokeLinejoin="round" 
          className={className}
        >
          {paths[name] || null}
        </svg>
      );
    }

    // ---------------------------------------------------------
    // COMPONENTE PRINCIPAL (APP)
    // ---------------------------------------------------------
    function App() {
      // Estado de Autenticação e Ligação ao Firestore
      const [user, setUser] = useState(null);
      const [loading, setLoading] = useState(true);
      const [dbStatus, setDbStatus] = useState('connecting'); // 'connecting' | 'synced' | 'error'
      const [copied, setCopied] = useState(false);

      // Dados da Aplicação Sincronizados
      const [transactions, setTransactions] = useState([]);
      const [budgets, setBudgets] = useState(DEFAULT_BUDGETS);
      const [goals, setGoals] = useState([]);

      // Dados de Contas Correntes Registadas
      const [accounts, setAccounts] = useState([]);

      // Dados do Sistema de Cartão de Crédito Sincronizados
      const [ccSettings, setCcSettings] = useState(DEFAULT_CC_SETTINGS);
      const [ccTransactions, setCcTransactions] = useState([]);

      // Estado para filtro global de Mês selecionado no Menu (Default: Maio de 2026)
      const [selectedMonth, setSelectedMonth] = useState('2026-05');

      // Estados de UI e Navegação
      const [activeTab, setActiveTab] = useState('dashboard');
      const [notification, setNotification] = useState(null);
      const [paymentModal, setPaymentModal] = useState({ isOpen: false, invoiceKey: null, label: '', total: 0, accountId: '' });
      
      // Estado para Modal de Adiantamento de Fatura do Cartão
      const [prepaymentModal, setPrepaymentModal] = useState({
        isOpen: false,
        amountType: 'total', // 'total' | 'custom'
        customAmount: '',
        accountId: ''
      });

      // Modais de Edição de Transação / Contas
      const [editModal, setEditModal] = useState({ isOpen: false, transaction: null });
      const [editCcModal, setEditCcModal] = useState({ isOpen: false, transaction: null });
      const [editAccountModal, setEditAccountModal] = useState({ isOpen: false, account: null }); 

      // Configuração para suporte a Lançamentos Parcelados
      const [isInstallment, setIsInstallment] = useState(false);
      const [installmentsCount, setInstallmentsCount] = useState(3);

      const [isCcInstallment, setIsCcInstallment] = useState(false);
      const [ccInstallmentsCount, setCcInstallmentsCount] = useState(3);

      // Modal para auto-ajustar limite quando excedido
      const [autoLimitModal, setAutoLimitModal] = useState({ isOpen: false, requested: 0, required: 0, txPayload: null });

      // Formulários e Estados Interativos
      const [newTx, setNewTx] = useState({ 
        desc: '', 
        amount: '', 
        type: 'despesa', 
        category: 'alimentacao', 
        date: new Date().toISOString().split('T')[0], 
        dueDate: new Date().toISOString().split('T')[0], 
        accountId: '',
        status: 'liquidado' 
      });
      const [newCcTx, setNewCcTx] = useState({ desc: '', amount: '', category: 'alimentacao', date: new Date().toISOString().split('T')[0] });
      const [goalDeposit, setGoalDeposit] = useState({ goalId: '', amount: '' });
      const [newGoal, setNewGoal] = useState({ name: '', target: '', current: '', deadline: '' });
      const [budgetForm, setBudgetForm] = useState({ category: 'alimentacao', amount: '' });
      
      const [ccSettingsForm, setCcSettingsForm] = useState({ limit: '', closingDay: '', dueDay: '', cardName: '' });
      
      // Cheque Especial (overdraftLimit) no formulário de Nova Conta Bancária
      const [newAccount, setNewAccount] = useState({ 
        name: '', 
        type: 'corrente', 
        initialBalance: '', 
        color: 'bg-blue-600',
        overdraftLimit: '1000' // Valor padrão: R$ 1.000,00
      });

      // Estados do Simulador de Juros Compostos
      const [simInitial, setSimInitial] = useState(5000);
      const [simMonthly, setSimMonthly] = useState(500);
      const [simRate, setSimRate] = useState(10.5);
      const [simYears, setSimYears] = useState(5);

      // Filtros do extrato de transações
      const [searchQuery, setSearchQuery] = useState('');
      const [filterType, setFilterType] = useState('all');
      const [filterCategory, setFilterCategory] = useState('all');
      const [filterStatus, setFilterStatus] = useState('all'); // 'all' | 'liquidado' | 'pendente'

      const triggerNotification = (message, type = 'success') => {
        setNotification({ message, type });
        setTimeout(() => setNotification(null), 4000);
      };

      // Inicializa campos de definições de cartão quando carregado
      useEffect(() => {
        if (ccSettings) {
          setCcSettingsForm({
            limit: ccSettings.limit.toString(),
            closingDay: ccSettings.closingDay.toString(),
            dueDay: ccSettings.dueDay.toString(),
            cardName: ccSettings.cardName || 'Crédito Visa Platinum'
          });
        }
      }, [ccSettings]);

      // Copiar regras de segurança do Firestore para o Clipboard
      const handleCopyRules = () => {
        const rulesText = `rules_version = '2';\n\nservice cloud.firestore {\n  match /databases/{database}/documents {\n    match /artifacts/\$(appId)/users/{userId}/{collectionName}/{documentId} {\n      allow read, write: if request.auth != null && request.auth.uid == userId;\n    }\n    match /{document=**} {\n      allow read, write: if false;\n    }\n  }\n}`;
        
        const tempInput = document.createElement('textarea');
        tempInput.value = rulesText;
        document.body.appendChild(tempInput);
        tempInput.select();
        document.execCommand('copy');
        document.body.removeChild(tempInput);
        
        setCopied(true);
        triggerNotification('Regras de segurança copiadas com sucesso!');
        setTimeout(() => setCopied(false), 3000);
      };

      // ---------------------------------------------------------
      // MÉTODOS DE BACKUP/FALLBACK AUXILIAR (LOCAL STORAGE)
      // ---------------------------------------------------------
      const loadFromLocalStorage = () => {
        try {
          const localTx = localStorage.getItem('finpro_transactions');
          const localBudgets = localStorage.getItem('finpro_budgets');
          const localGoals = localStorage.getItem('finpro_goals');
          const localCcSettings = localStorage.getItem('finpro_cc_settings');
          const localCcTx = localStorage.getItem('finpro_cc_transactions');
          const localAccounts = localStorage.getItem('finpro_accounts');
          
          if (localTx) setTransactions(JSON.parse(localTx));
          if (localBudgets) setBudgets(JSON.parse(localBudgets));
          if (localGoals) setGoals(JSON.parse(localGoals));
          if (localCcSettings) setCcSettings(JSON.parse(localCcSettings));
          if (localCcTx) setCcTransactions(JSON.parse(localCcTx));
          if (localAccounts) setAccounts(JSON.parse(localAccounts));
        } catch (e) {
          console.error("Erro ao carregar do armazenamento local:", e);
        }
      };

      const saveToLocalStorage = (txs, budg, gls, ccSet, ccTx, accs) => {
        try {
          if (txs) localStorage.setItem('finpro_transactions', JSON.stringify(txs));
          if (budg) localStorage.setItem('finpro_budgets', JSON.stringify(budg));
          if (gls) localStorage.setItem('finpro_goals', JSON.stringify(gls));
          if (ccSet) localStorage.setItem('finpro_cc_settings', JSON.stringify(ccSet));
          if (ccTx) localStorage.setItem('finpro_cc_transactions', JSON.stringify(ccTx));
          if (accs) localStorage.setItem('finpro_accounts', JSON.stringify(accs));
        } catch (e) {
          console.error("Erro ao gravar dados localmente:", e);
        }
      };

      // ---------------------------------------------------------
      // 1. SETUP DE AUTENTICAÇÃO COM FALLBACK ROBUSTO (REGRA 3)
      // ---------------------------------------------------------
      useEffect(() => {
        const initAuth = async () => {
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              try {
                await signInWithCustomToken(auth, __initial_auth_token);
              } catch (tokenErr) {
                console.warn("Token customizado incompatível. Login anónimo...", tokenErr);
                await signInAnonymously(auth);
              }
            } else {
              await signInAnonymously(auth);
            }
          } catch (err) {
            console.error("Erro crítico na autenticação Firebase:", err);
            setDbStatus('error');
            loadFromLocalStorage();
            triggerNotification('Falha de ligação à nuvem. A usar armazenamento local!', 'warning');
          }
        };
        initAuth();

        const unsubscribe = onAuthStateChanged(auth, (usr) => {
          setUser(usr);
          setLoading(false);
        });

        return () => unsubscribe();
      }, []);

      // Criar conta padrão se nenhuma existir (Garante resiliência)
      useEffect(() => {
        if (!loading && accounts.length === 0) {
          const defaultAcc = [{ 
            id: 'default-acc', 
            name: 'Conta Principal', 
            type: 'corrente', 
            initialBalance: 0, 
            overdraftLimit: 1000, 
            color: 'bg-blue-600', 
            createdAt: new Date().toISOString() 
          }];
          setAccounts(defaultAcc);
          saveToLocalStorage(null, null, null, null, null, defaultAcc);
        }
      }, [accounts, loading]);

      // ---------------------------------------------------------
      // 2. SINCRONIZAÇÃO EM TEMPO REAL COM FIREBASE (REGRA 1, 3)
      // ---------------------------------------------------------
      useEffect(() => {
        if (!user) return;

        setLoading(true);
        setDbStatus('connecting');

        // Referências estritas conforme Regra 1
        const txCollectionRef = collection(db, 'artifacts', appId, 'users', user.uid, 'transactions');
        const goalsCollectionRef = collection(db, 'artifacts', appId, 'users', user.uid, 'goals');
        const budgetsDocRef = doc(db, 'artifacts', appId, 'users', user.uid, 'budgets', 'limits');
        const ccSettingsDocRef = doc(db, 'artifacts', appId, 'users', user.uid, 'creditCard', 'settings');
        const ccTxCollectionRef = collection(db, 'artifacts', appId, 'users', user.uid, 'creditTransactions');
        const accountsCollectionRef = collection(db, 'artifacts', appId, 'users', user.uid, 'accounts');

        let active = true;

        const handlePermissionError = (err, contexto) => {
          console.warn(`Erro de permissão ou sincronização silencioso [${contexto}]:`, err);
          if (active) {
            setDbStatus('error');
            setLoading(false);
            loadFromLocalStorage();
          }
        };

        // Contas Bancárias
        const unsubAccounts = onSnapshot(accountsCollectionRef, 
          (snapshot) => {
            if (!active) return;
            const accountsList = [];
            snapshot.forEach(docSnap => {
              accountsList.push({ id: docSnap.id, ...docSnap.data() });
            });
            setAccounts(accountsList);
            saveToLocalStorage(null, null, null, null, null, accountsList);
          },
          (err) => handlePermissionError(err, 'contas bancárias')
        );

        // Transações de Caixa
        const unsubTx = onSnapshot(txCollectionRef, 
          (snapshot) => {
            if (!active) return;
            const txList = [];
            snapshot.forEach(docSnap => {
              txList.push({ id: docSnap.id, ...docSnap.data() });
            });
            txList.sort((a, b) => new Date(b.date) - new Date(a.date));
            setTransactions(txList);
            saveToLocalStorage(txList, null, null, null, null, null);
            setDbStatus('synced');
            setLoading(false);
          },
          (err) => handlePermissionError(err, 'transações')
        );

        // Metas de Poupança
        const unsubGoals = onSnapshot(goalsCollectionRef, 
          (snapshot) => {
            if (!active) return;
            const goalsList = [];
            snapshot.forEach(docSnap => {
              goalsList.push({ id: docSnap.id, ...docSnap.data() });
            });
            setGoals(goalsList);
            saveToLocalStorage(null, null, goalsList, null, null, null);
          },
          (err) => handlePermissionError(err, 'metas')
        );

        // Orçamentos (Limites)
        const unsubBudgets = onSnapshot(budgetsDocRef, 
          (docSnap) => {
            if (!active) return;
            if (docSnap.exists()) {
              const data = docSnap.data();
              setBudgets(data);
              saveToLocalStorage(null, data, null, null, null, null);
            } else {
              setDoc(budgetsDocRef, DEFAULT_BUDGETS).catch(() => {});
              setBudgets(DEFAULT_BUDGETS);
              saveToLocalStorage(null, DEFAULT_BUDGETS, null, null, null, null);
            }
          },
          (err) => handlePermissionError(err, 'orçamentos')
        );

        // Definições de Cartão de Crédito
        const unsubCcSettings = onSnapshot(ccSettingsDocRef,

            }
          },
          (err) => handlePermissionError(err, 'definições de cartão')
        );

        // Transações do Cartão de Crédito
        const unsubCcTx = onSnapshot(ccTxCollectionRef, 
          (snapshot) => {
            if (!active) return;
            const ccTxList = [];
            snapshot.forEach(docSnap => {
              ccTxList.push({ id: docSnap.id, ...docSnap.data() });

          },

        );

        return () => {
          active = false;

      // ---------------------------------------------------------

      // Adicionar Nova Conta Bancária (Suporta Cheque Especial)

      };

      // Controlar alterações na data para sugerir status "pendente" automaticamente
      const handleDateChange = (dateVal) => {
        const todayStr = new Date().toISOString().split('T')[0];
        const isFuture = dateVal > todayStr;

          ...prev,

        const numInstallments = isInstallment ? installmentsCount : 1;

        const remainder = Math.round((totalAmount - (baseInstallmentAmount * numInstallments)) * 100) / 100;

        const generatedTxs = [];

        for (let i = 1; i <= numInstallments; i++) {
          const installmentVal = (i === numInstallments) ? (baseInstallmentAmount + remainder) : baseInstallmentAmount;
          
          // Calcular a data de registo da prestação (uma por mês)

        } else {

      // Adicionar Transação de Cartão de Crédito (Compra)
      const handleAddCcTransaction = async (e) => {
        if (e) e.preventDefault();
        
        const totalAmount = parseFloat(newCcTx.amount);
        if (!newCcTx.desc.trim() || isNaN(totalAmount) || totalAmount <= 0) {

          return;
        }

        const baseInstallmentAmount = Math.floor((totalAmount / numInstallments) * 100) / 100;
        const remainder = Math.round((totalAmount - (baseInstallmentAmount * numInstallments)) * 100) / 100;

        for (let i = 1; i <= numInstallments; i++) {
          const installmentVal = (i === numInstallments) ? (baseInstallmentAmount + remainder) : baseInstallmentAmount;

          amount: total,
          type: 'despesa',
          category: 'outros_desp',
          date: new Date().toISOString().split('T')[0],
          dueDate: new Date().toISOString().split('T')[0],
          accountId: targetAccId,
          status: 'liquidado',
          createdAt: new Date().toISOString()
        };

        const txsToUpdate = groupedInvoices[invoiceKey]?.transactions || [];

        if (dbStatus === 'synced' && user) {
          try {
            const txCollectionRef = collection(db, 'artifacts', appId, 'users', user.uid, 'transactions');
            await addDoc(txCollectionRef, paymentTx);

            for (const item of txsToUpdate) {
              const ccDocRef = doc(db, 'artifacts', appId, 'users', user.uid, 'creditTransactions', item.id);
              await updateDoc(ccDocRef, { paid: true });
            }
            triggerNotification(`Fatura de ${label} paga com sucesso!`);
          } catch (err) {
            console.error("Erro no pagamento na nuvem:", err);
            processPaymentLocally(paymentTx, txsToUpdate);
          }
        } else {
          processPaymentLocally(paymentTx, txsToUpdate);
        }

        setPaymentModal({ isOpen: false, invoiceKey: null, label: '', total: 0, accountId: '' });
      };

      const processPaymentLocally = (paymentTx, txsToUpdate) => {
        const newLocalTx = { id: Date.now().toString(), ...paymentTx };
        const updatedTxs = [newLocalTx, ...transactions];
        setTransactions(updatedTxs);

        const idsToPay = txsToUpdate.map(t => t.id);
        const updatedCcTxs = ccTransactions.map(t => 
          idsToPay.includes(t.id) ? { ...t, paid: true } : t
        );
        setCcTransactions(updatedCcTxs);

        saveToLocalStorage(updatedTxs, null, null, null, updatedCcTxs, null);
        triggerNotification(`Fatura de ${paymentTx.desc} liquidada localmente!`);
      };

      // Criar Meta de Poupança
      const handleCreateGoal = async (e) => {
        e.preventDefault();
        const target = parseFloat(newGoal.target);
        const current = parseFloat(newGoal.current) || 0;

        if (!newGoal.name.trim() || isNaN(target) || target <= 0) {
          triggerNotification('Defina um nome e valor de objetivo válidos.', 'error');
          return;
        }

        const goalData = {
          name: newGoal.name.trim(),
          target,
          current,
          deadline: newGoal.deadline || new Date().toISOString().split('T')[0]
        };

        if (dbStatus === 'synced' && user) {
          try {
            const goalsCollectionRef = collection(db, 'artifacts', appId, 'users', user.uid, 'goals');
            await addDoc(goalsCollectionRef, goalData);
            triggerNotification('Meta de poupança sincronizada!');
          } catch (err) {
            console.error(err);
            saveGoalLocally(goalData);
          }
        } else {
          saveGoalLocally(goalData);
        }

        setNewGoal({ name: '', target: '', current: '', deadline: '' });
      };

      const saveGoalLocally = (goalData) => {
        const localGoal = { id: Date.now().toString(), ...goalData };
        const updated = [...goals, localGoal];
        setGoals(updated);
        saveToLocalStorage(null, null, updated, null, null, null);
        triggerNotification('Meta de poupança adicionada localmente!');
      };

      // Depositar / Aportar em Meta
      const handleGoalDeposit = async (e) => {
        e.preventDefault();
        const amt = parseFloat(goalDeposit.amount);
        if (!goalDeposit.goalId || isNaN(amt) || amt <= 0) {
          triggerNotification('Introduza um montante de depósito válido.', 'error');
          return;
        }

        const selectedGoal = goals.find(g => g.id === goalDeposit.goalId);
        if (!selectedGoal) return;

        const newCurrent = Math.min(selectedGoal.target, selectedGoal.current + amt);

        const autoTx = {
          desc: `Reforço Meta: ${selectedGoal.name}`,
          amount: amt,
          type: 'despesa',
          category: 'outros_desp',
          date: new Date().toISOString().split('T')[0],
          dueDate: new Date().toISOString().split('T')[0],
          status: 'liquidado',
          createdAt: new Date().toISOString()
        };

        if (dbStatus === 'synced' && user) {
          try {
            const goalDocRef = doc(db, 'artifacts', appId, 'users', user.uid, 'goals', selectedGoal.id);
            await updateDoc(goalDocRef, { current: newCurrent });

            const txCollectionRef = collection(db, 'artifacts', appId, 'users', user.uid, 'transactions');
            await addDoc(txCollectionRef, autoTx);

            triggerNotification(`R$ ${amt.toFixed(2)} depositados na meta!`);
            return;
          } catch (err) {
            console.error(err);
          }
        }

        // Fallback Local
        const updatedGoals = goals.map(g => g.id === selectedGoal.id ? { ...g, current: newCurrent } : g);
        setGoals(updatedGoals);
        
        const localTx = { id: Date.now().toString(), ...autoTx };
        const updatedTxs = [localTx, ...transactions];
        setTransactions(updatedTxs);

        saveToLocalStorage(updatedTxs, null, updatedGoals, null, null, null);
        setGoalDeposit({ goalId: '', amount: '' });
        triggerNotification(`Reforço de R$ ${amt.toFixed(2)} registado localmente!`);
      };

      // Excluir Meta de Poupança
      const handleDeleteGoal = async (id) => {
        if (dbStatus === 'synced' && user) {
          try {
            const goalDocRef = doc(db, 'artifacts', appId, 'users', user.uid, 'goals', id);
            await deleteDoc(goalDocRef);
            triggerNotification('Meta de poupança removida da nuvem.', 'warning');
            return;
          } catch (err) {
            console.error(err);
          }
        }

        const updated = goals.filter(g => g.id !== id);
        setGoals(updated);
        saveToLocalStorage(null, null, updated, null, null, null);
        triggerNotification('Meta de poupança removida localmente.', 'warning');
      };

      // Atualizar Limite de Orçamento
      const handleSetBudget = async (e) => {
        e.preventDefault();
        const amt = parseFloat(budgetForm.amount);
        if (isNaN(amt) || amt <= 0) {
          triggerNotification('Defina um limite de gastos válido.', 'error');
          return;
        }

        const updatedBudgets = {
          ...budgets,
          [budgetForm.category]: amt
        };

        if (dbStatus === 'synced' && user) {
          try {
            const budgetsDocRef = doc(db, 'artifacts', appId, 'users', user.uid, 'budgets', 'limits');
            await setDoc(budgetsDocRef, updatedBudgets);
            triggerNotification('Limite de despesa atualizado no Firebase!');
          } catch (err) {
            console.error(err);
            saveBudgetLocally(updatedBudgets);
          }
        } else {
          saveBudgetLocally(updatedBudgets);
        }

        setBudgetForm({ category: 'moradia', amount: '' });
      };

      const saveBudgetLocally = (updatedBudgets) => {
        setBudgets(updatedBudgets);
        saveToLocalStorage(null, updatedBudgets, null, null, null, null);
        triggerNotification('Limite de despesa atualizado localmente!');
      };

      // Gerar Dados de Demonstração
      const handleGenerateMockData = async () => {
        const targetAccId = accounts[0]?.id || 'default-acc';
        const mockTxs = [
          { desc: 'Vencimento / Salário', amount: 5500, type: 'receita', category: 'salario', date: '2026-05-01', dueDate: '2026-05-01', status: 'liquidado', accountId: targetAccId },
          { desc: 'Renda da Habitação', amount: 1600, type: 'despesa', category: 'moradia', date: '2026-05-02', dueDate: '2026-05-10', status: 'liquidado', accountId: targetAccId },
          { desc: 'Supermercado e Alimentação', amount: 850, type: 'despesa', category: 'alimentacao', date: '2026-05-03', dueDate: '2026-05-03', status: 'liquidado', accountId: targetAccId },
          { desc: 'Projeto Freelance Front-End', amount: 1200, type: 'receita', category: 'freelance', date: '2026-05-10', dueDate: '2026-05-15', status: 'liquidado', accountId: targetAccId },
          { desc: 'Fatura de Luz Agendada', amount: 140, type: 'despesa', category: 'moradia', date: '2026-06-05', dueDate: '2026-06-12', status: 'pendente', accountId: targetAccId }
        ];

        if (dbStatus === 'synced' && user) {
          try {
            const txCollectionRef = collection(db, 'artifacts', appId, 'users', user.uid, 'transactions');
            for (const m of mockTxs) {
              await addDoc(txCollectionRef, { ...m, createdAt: new Date().toISOString() });
            }
            triggerNotification('Dados de teste guardados na nuvem!');
            return;
          } catch (err) {
            console.error("Erro ao guardar dados demonstrativos na nuvem:", err);
          }
        }

        const localMockTxs = mockTxs.map((m, idx) => ({ id: `mock-${idx}`, ...m, createdAt: new Date().toISOString() }));
        setTransactions(localMockTxs);
        saveToLocalStorage(localMockTxs, null, null, null, null, null);
        triggerNotification('Dados demonstrativos carregados localmente!');
      };

      // Componente utilitário para renderizar o estado de liquidação de forma visual
      const renderStatusBadge = (status) => {
        if (status === 'pendente') {
          return (
            <span className="bg-amber-50 text-amber-700 border border-amber-100 text-[9px] font-bold px-1.5 py-0.5 rounded-full inline-flex items-center gap-1">
              ⏳ Pendente
            </span>
          );
        }
        return (
          <span className="bg-emerald-50 text-emerald-700 border border-emerald-100 text-[9px] font-bold px-1.5 py-0.5 rounded-full inline-flex items-center gap-1">
            ✓ Liquidado
          </span>
        );
      };

      // ---------------------------------------------------------
      // 5. MÉTODOS DE CÁLCULO DINÂMICO DE CONTAS E ESTATÍSTICAS
      // ---------------------------------------------------------

      // Cálculo Dinâmico da Lista de Meses Disponíveis baseado em DATA DE VENCIMENTO
      const availableMonths = useMemo(() => {
        const monthsSet = new Set();
        
        // Incluir o mês de referência atual por segurança para nunca estar vazio
        monthsSet.add("2026-05");

        transactions.forEach(t => {
          // Usar dueDate como data principal
          const dateToUse = t.dueDate || t.date;
          if (dateToUse && dateToUse.length >= 7) {
            monthsSet.add(dateToUse.substring(0, 7)); // Obtém o padrão YYYY-MM
          }
        });

        ccTransactions.forEach(t => {
          if (t.date && t.date.length >= 7) {
            monthsSet.add(t.date.substring(0, 7));
          }
        });

        // Ordenar de forma decrescente
        const sorted = Array.from(monthsSet).sort((a, b) => b.localeCompare(a));

        return sorted.map(m => {
          const [year, month] = m.split('-');
          const dateObj = new Date(parseInt(year), parseInt(month) - 1, 15);
          const rawLabel = dateObj.toLocaleDateString('pt-PT', { month: 'long', year: 'numeric' });
          const label = rawLabel.charAt(0).toUpperCase() + rawLabel.slice(1);
          return { value: m, label };
        });
      }, [transactions, ccTransactions]);

      // Navegar para o mês seguinte ou anterior de forma reativa
      const navigateMonth = (direction) => {
        if (selectedMonth === 'all') return;
        const index = availableMonths.findIndex(m => m.value === selectedMonth);
        if (index === -1) return;

        let targetIndex = index + (direction === 'next' ? -1 : 1);
        if (targetIndex >= 0 && targetIndex < availableMonths.length) {
          setSelectedMonth(availableMonths[targetIndex].value);
        }
      };

      // Filtrar transações pelo mês selecionado considerando rigorosamente a DATA DE VENCIMENTO
      const transactionsFilteredByMonth = useMemo(() => {
        if (selectedMonth === 'all') return transactions;
        return transactions.filter(t => {
          const dateToUse = t.dueDate || t.date;
          return dateToUse && dateToUse.startsWith(selectedMonth);
        });
      }, [transactions, selectedMonth]);

      // Filtrar compras a crédito do mês de referência
      const ccTransactionsFilteredByMonth = useMemo(() => {
        if (selectedMonth === 'all') return ccTransactions;
        return ccTransactions.filter(t => t.date && t.date.startsWith(selectedMonth));
      }, [ccTransactions, selectedMonth]);

      // Para fins bancários reais e visualização de Cheque Especial, o saldo corrente de cada conta
      // deve acumular TODAS as transações anteriores (histórico real), e não apenas as do mês filtrado no menu.
      const accountsWithBalances = useMemo(() => {
        return accounts.map(acc => {
          let currentVal = parseFloat(acc.initialBalance) || 0;
          
          transactions.forEach(t => {
            const isMatch = t.accountId === acc.id || (!t.accountId && acc.id === 'default-acc');
            
            if (isMatch && t.status !== 'pendente') {
              const amt = parseFloat(t.amount) || 0;
              if (t.type === 'receita') {
                currentVal += amt;
              } else {
                currentVal -= amt;
              }
            }
          });

          const overdraftLimit = acc.overdraftLimit !== undefined && acc.overdraftLimit !== null 
            ? parseFloat(acc.overdraftLimit) 
            : 1000;

          return { ...acc, currentBalance: currentVal, overdraftLimit };
        });
      }, [accounts, transactions]);

      // Estatísticas gerais considerando os estados pendente e liquidado do período selecionado
      const stats = useMemo(() => {
        const totalBalance = accountsWithBalances.reduce((sum, acc) => sum + acc.currentBalance, 0);

        let income = 0;
        let expense = 0;
        let pendingIncome = 0;
        let pendingExpense = 0;
        
        transactionsFilteredByMonth.forEach(t => {
          const amt = parseFloat(t.amount) || 0;
          if (t.status === 'pendente') {
            if (t.type === 'receita') {
              pendingIncome += amt;
            } else {
              pendingExpense += amt;
            }
          } else {
            if (t.type === 'receita') {
              income += amt;
            } else {
              expense += amt;
            }
          }
        });

        const savingsRate = income > 0 ? Math.max(0, Math.min(100, ((income - expense) / income) * 100)) : 0;

        const categoryTotals = {};
        transactionsFilteredByMonth.filter(t => t.type === 'despesa' && t.status !== 'pendente').forEach(t => {
          categoryTotals[t.category] = (categoryTotals[t.category] || 0) + parseFloat(t.amount);
        });

        return { income, expense, balance: totalBalance, savingsRate, categoryTotals, pendingIncome, pendingExpense };
      }, [transactionsFilteredByMonth, accountsWithBalances]);

      // Atribuir as compras/créditos a crédito ao seu período de faturação correspondente
      const groupedInvoices = useMemo(() => {
        const invoices = {};
        const closingDay = ccSettings?.closingDay || 5;

        ccTransactions.forEach(tx => {
          const dateObj = new Date(tx.date);
          const year = dateObj.getUTCFullYear();
          const month = dateObj.getUTCMonth(); // 0-11
          const day = dateObj.getUTCDate();

          let invoiceYear = year;
          let invoiceMonth = month;

          if (day > closingDay) {
            invoiceMonth += 1;
            if (invoiceMonth > 11) {
              invoiceMonth = 0;
              invoiceYear += 1;
            }
          }

          const invoiceKey = `${invoiceYear}-${String(invoiceMonth + 1).padStart(2, '0')}`;
          
          const labelDate = new Date(invoiceYear, invoiceMonth);
          const rawLabel = labelDate.toLocaleDateString('pt-PT', { month: 'long', year: 'numeric' });
          const invoiceLabel = rawLabel.charAt(0).toUpperCase() + rawLabel.slice(1);

          if (!invoices[invoiceKey]) {
            invoices[invoiceKey] = {
              key: invoiceKey,
              label: invoiceLabel,
              transactions: [],
              total: 0,
              unpaidTotal: 0,
              isPaid: true
            };
          }

          invoices[invoiceKey].transactions.push(tx);
          invoices[invoiceKey].total += parseFloat(tx.amount);
          if (!tx.paid) {
            invoices[invoiceKey].unpaidTotal += parseFloat(tx.amount);
            invoices[invoiceKey].isPaid = false;
          }
        });

        return invoices;
      }, [ccTransactions, ccSettings]);

      // Descobrir a Chave da Fatura Ativa (Mês corrente de gastos)
      const activeInvoiceKey = useMemo(() => {
        if (selectedMonth !== 'all') {
          return selectedMonth;
        }
        const today = new Date();
        const closingDay = ccSettings?.closingDay || 5;
        let yr = today.getFullYear();
        let m = today.getMonth();
        const d = today.getDate();

        if (d > closingDay) {
          m += 1;
          if (m > 11) {
            m = 0;
            yr += 1;
          }
        }
        return `${yr}-${String(m + 1).padStart(2, '0')}`;
      }, [ccSettings, selectedMonth]);

      // Dívida total não paga e Limite disponível do Cartão (deduzindo os créditos de adiantamento)
      const totalUnpaidCcAmount = useMemo(() => {
        return ccTransactions
          .filter(tx => !tx.paid)
          .reduce((sum, tx) => sum + parseFloat(tx.amount), 0);
      }, [ccTransactions]);

      const availableCcLimit = useMemo(() => {
        const totalLimit = ccSettings?.limit || 3000;
        return Math.max(0, totalLimit - totalUnpaidCcAmount);
      }, [ccSettings, totalUnpaidCcAmount]);

      // Agora exibe apenas o valor de compras por pagar na fatura ativa (deduzindo adiantamentos)
      const activeInvoiceTotal = useMemo(() => {
        const activeInvoice = groupedInvoices[activeInvoiceKey];
        if (!activeInvoice) return 0;
        return activeInvoice.transactions
          .filter(tx => !tx.paid)
          .reduce((sum, tx) => sum + parseFloat(tx.amount), 0);
      }, [groupedInvoices, activeInvoiceKey]);

      // Alertas de limite do formulário
      const showLimitWarning = useMemo(() => {
        const amt = parseFloat(newCcTx.amount);
        return (!isNaN(amt) && amt > availableCcLimit);
      }, [newCcTx.amount, availableCcLimit]);

      // Cálculo de Alerta de Cheque Especial no Formulário de Lançamento Ativo
      const overdraftProjectedWarning = useMemo(() => {
        if (newTx.type !== 'despesa') return null;
        const amt = parseFloat(newTx.amount) || 0;
        if (amt <= 0) return null;

        const targetId = newTx.accountId || accounts[0]?.id || 'default-acc';
        const targetAcc = accountsWithBalances.find(a => a.id === targetId);
        if (!targetAcc) return null;

        const projectedBalance = targetAcc.currentBalance - amt;
        const odfLimit = parseFloat(targetAcc.overdraftLimit) || 0;

        if (projectedBalance < 0) {
          const requiredOdf = Math.abs(projectedBalance);
          const exceedsLimit = requiredOdf > odfLimit;

          return {
            accName: targetAcc.name,
            projectedBalance,
            requiredOdf,
            odfLimit,
            exceedsLimit
          };
        }

        return null;
      }, [newTx, accountsWithBalances, accounts]);

      // Alertas do Cheque Especial ao motor de Saúde Financeira
      const financialTips = useMemo(() => {
        const tips = [];
        
        // Verifica se alguma conta está a usar o cheque especial atualmente
        accountsWithBalances.forEach(acc => {
          if (acc.currentBalance < 0) {
            const usedOdf = Math.abs(acc.currentBalance);
            tips.push({
              type: 'danger',
              text: `⚠️ CHEQUE ESPECIAL ATIVO: A conta "${acc.name}" está com saldo negativo em R$ ${usedOdf.toFixed(2)}. Serão aplicados juros e IOF diários pelo seu banco! Evite manter-se nesta situação.`
            });
          }
        });

        if (stats.savingsRate > 20) {
          tips.push({ type: 'success', text: `Excelente! Conseguiu poupar ${stats.savingsRate.toFixed(1)}% do seu orçamento. Considere investir em longo prazo.` });
        } else if (stats.savingsRate > 0) {
          tips.push({ type: 'info', text: `A sua taxa de poupança situa-se em ${stats.savingsRate.toFixed(1)}%. Tente poupar um pouco mais para atingir a meta recomendada de 20%.` });
        } else if (transactionsFilteredByMonth.length > 0) {
          tips.push({ type: 'warning', text: `Atenção: As suas despesas superaram as receitas este mês. Avalie conter despesas não essenciais.` });
        }

        // Alerta de Limite do Cartão de Crédito
        if (availableCcLimit < (ccSettings?.limit * 0.15)) {
          tips.push({ type: 'warning', text: `Cartão de Crédito: O limite disponível do seu cartão está abaixo dos 15%. Reduza compras a crédito.` });
        }

        Object.keys(budgets).forEach(cat => {
          const limit = budgets[cat];
          const spent = stats.categoryTotals[cat] || 0;
          const catObj = CATEGORIES.despesa.find(c => c.id === cat);
          if (catObj && spent > limit && limit > 0) {
            tips.push({ type: 'danger', text: `Orçamento Estourado: Ultrapassou o limite em "${catObj.name}" por R$ ${(spent - limit).toFixed(2)}!` });
          } else if (catObj && limit > 0 && spent > limit * 0.8) {
            tips.push({ type: 'warning', text: `Alerta: Os custos com "${catObj.name}" atingiram mais de 80% do teto definido.` });
          }
        });

        return tips;
      }, [stats, budgets, transactionsFilteredByMonth, availableCcLimit, ccSettings, accountsWithBalances]);

      // Simulador de Juros Compostos
      const investmentSimulation = useMemo(() => {
        const monthlyRate = Math.pow(1 + (simRate / 100), 1 / 12) - 1;
        const totalMonths = simYears * 12;
        let balance = simInitial;
        let totalInvested = simInitial;
        const timeline = [];

        for (let month = 1; month <= totalMonths; month++) {
          const interestEarned = balance * monthlyRate;
          balance += interestEarned + simMonthly;
          totalInvested += simMonthly;

          if (month % 12 === 0 || month === totalMonths) {
            timeline.push({
              year: month / 12,
              total: Math.round(balance),
              invested: Math.round(totalInvested),
              gains: Math.round(balance - totalInvested)
            });
          }
        }

        return { finalValue: balance, totalInvested, totalGains: balance - totalInvested, timeline };
      }, [simInitial, simMonthly, simRate, simYears]);

      // Filtros Rápidos das Transações em Memória
      const filteredTransactions = useMemo(() => {
        return transactionsFilteredByMonth.filter(t => {
          const matchesSearch = t.desc.toLowerCase().includes(searchQuery.toLowerCase());
          const matchesType = filterType === 'all' || t.type === filterType;
          const matchesCategory = filterCategory === 'all' || t.category === filterCategory;
          const matchesStatus = filterStatus === 'all' || (t.status || 'liquidado') === filterStatus;
          return matchesSearch && matchesType && matchesCategory && matchesStatus;
        });
      }, [transactionsFilteredByMonth, searchQuery, filterType, filterCategory, filterStatus]);

      // Cálculo de visualização do pré-pagamento/adiantamento reativo
      const prepaymentLivePreview = useMemo(() => {
        let paymentAmount = 0;
        if (prepaymentModal.amountType === 'total') {
          paymentAmount = totalUnpaidCcAmount;
        } else {
          paymentAmount = parseFloat(prepaymentModal.customAmount) || 0;
        }

        const nextUnpaid = Math.max(0, totalUnpaidCcAmount - paymentAmount);
        const nextAvailable = Math.min(ccSettings?.limit || 3000, availableCcLimit + paymentAmount);

        return { paymentAmount, nextUnpaid, nextAvailable };
      }, [prepaymentModal.amountType, prepaymentModal.customAmount, totalUnpaidCcAmount, availableCcLimit, ccSettings]);

      return (
        <div className="min-h-screen bg-slate-50 text-slate-800 flex flex-col font-sans">
          
          {/* Modal de Adiantamento de Pagamento (Amortização Fatura) */}
          {prepaymentModal.isOpen && (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
              <div className="bg-white rounded-3xl p-6 max-w-md w-full shadow-2xl border border-slate-100 transform transition-all">
                <div className="flex items-center gap-3 text-emerald-600 mb-4">
                  <div className="p-2.5 bg-emerald-50 text-emerald-600 rounded-2xl">
                    <Icon name="dollarSign" className="w-8 h-8 shrink-0" />
                  </div>
                  <div>
                    <h3 className="text-lg font-black text-slate-900">Adiantar Pagamento</h3>
                    <p className="text-xs text-slate-400">Inserir crédito de amortização na fatura do mês</p>
                  </div>
                </div>

                <div className="space-y-4">
                  
                  {/* Tipo de Valor */}
                  <div className="space-y-2">
                    <label className="block text-[10px] uppercase font-bold text-slate-400">Opção de Amortização</label>
                    <div className="grid grid-cols-2 gap-2">
                      <button
                        type="button"
                        onClick={() => setPrepaymentModal(prev => ({ ...prev, amountType: 'total' }))}
                        className={`p-3 rounded-2xl text-xs font-bold border transition ${
                          prepaymentModal.amountType === 'total' 
                            ? 'bg-slate-900 border-slate-900 text-white' 
                            : 'bg-white border-slate-200 text-slate-600 hover:bg-slate-50'
                        }`}
                      >
                        Total em Aberto
